                      <g key={`f${i}`}>
                        <circle cx={vData.toSVG(points[i].lat,points[i].lon).x} cy={vData.toSVG(points[i].lat,points[i].lon).y} r={vData.r40} fill={theme.hexMain} fillOpacity="0.05" stroke={isDark ? "#64748b" : "#d6d3d1"} strokeWidth={1.5/transform.k} strokeDasharray="5,5"/>
                        <circle cx={vData.toSVG(points[i].lat,points[i].lon).x} cy={vData.toSVG(points[i].lat,points[i].lon).y} r={vData.rSafe} fill="none" stroke={isDark ? "#f59e0b" : "#d97706"} strokeWidth={1/transform.k} strokeDasharray="2,2" opacity={isDark ? "0.4" : "0.5"}/>
                        <circle 
                            cx={vData.toSVG(points[i].lat,points[i].lon).x} 
                            cy={vData.toSVG(points[i].lat,points[i].lon).y} 
                            r={vData.rSafe*0.25} 
                            fill={theme.hexMain} 
                            className="transition-colors cursor-pointer hover:brightness-110 active:scale-90"
                            onClick={() => handleFlowerClick(i)}
                            style={{transformOrigin:`${vData.toSVG(points[i].lat,points[i].lon).x}px ${vData.toSVG(points[i].lat,points[i].lon).y}px`}} 
                        />
                        <text x={vData.toSVG(points[i].lat,points[i].lon).x} y={vData.toSVG(points[i].lat,points[i].lon).y} textAnchor="middle" dominantBaseline="central" fill={isDark ? "#0f172a" : "#292524"} fontSize={18/transform.k} fontWeight="bold" className="pointer-events-none">{i+1}</text>
                        
                        <polyline points={p.map(x=>`${x.x},${x.y}`).join(' ')} fill="none" stroke={theme.hexLine} strokeWidth={vData.rSafe * 1.5} strokeLinejoin="round" strokeLinecap="round" opacity="0.15" className="pointer-events-none"/>
                        <polyline points={p.map(x=>`${x.x},${x.y}`).join(' ')} fill="none" stroke={theme.hexLine} strokeWidth={4/transform.k} strokeLinejoin="round" strokeLinecap="round" className="pointer-events-none"/>
                        
                        <circle cx={p[0].x} cy={p[0].y} r={vData.rSafe*0.15} fill={isDark ? "#60a5fa" : "#2563eb"} className="pointer-events-none"/>
                        <circle cx={p[p.length-1].x} cy={p[p.length-1].y} r={vData.rSafe*0.15} fill={isDark ? "#f87171" : "#dc2626"} className="pointer-events-none"/>
                        <circle cx={vData.fPaths[i].x} cy={vData.fPaths[i].y} r={vData.rSafe*0.15} fill={isDark ? "#e879f9" : "#c026d3"} className="pointer-events-none"/>
                      </g>)
                    })}
                    <polyline points={vData.fPaths.map(p=>`${p.x},${p.y}`).join(' ')} fill="none" stroke={isDark ? "#e879f9" : "#c026d3"} strokeWidth={2.5/transform.k} strokeLinejoin="round" strokeLinecap="round" strokeDasharray="5,5" className="pointer-events-none"/>
                  </g>
                </g>
              )}
            </svg>
            {!vData && <div className={`absolute inset-0 flex items-center justify-center text-sm font-bold tracking-widest transition-colors duration-300 text-stone-500 dark:text-slate-500`}><i className={`fas fa-satellite mr-2 animate-pulse ${isDark ? '' : 'text-blue-500'}`}></i>待命狀態：請載入座標...</div>}
          </div>
        </div>
      );
    }

    // --- 【子元件：模式二 幾何盲掃矩陣 (V36 降維重構 + 同心圓麥田圈實裝)】 ---
    function Mode2({ isDark }) {
      const mapRef = useRef(null);
      const layerGroupRef = useRef(null);
      
      const [config, setConfig] = useStickyState({ startCoord: '', width: '1.5', rows: '20', axis: 'LINE', sweepDir: 'R', advDir: 'F', speedKmH: 18, angle: 0, layers: 1 }, 'pikmin_v36_m2_config');
      const configRef = useRef(config);
      useEffect(() => { configRef.current = config; }, [config]);

      const [searchQuery, setSearchQuery] = useState('');
      const [gpxOut, setGpxOut] = useState('');
      const [csvOut, setCsvOut] = useState('');
      const [outputFormat, setOutputFormat] = useState('gpx');
      const [generatedPts, setGeneratedPts] = useState([]);
      const [copied, setCopied] = useState(false);
      const [stats, setStats] = useState({ dist: 0, time: 0 });
      const [loading, setLoading] = useState(false);

      const generateGrid = useCallback((overrideConfig = null, autoFit = true) => {
        setLoading(true);
        setTimeout(() => {
          try {
            const activeConfig = overrideConfig || configRef.current;
            const { startCoord, width: wStr, rows: rStr, axis, sweepDir, advDir, speedKmH, angle, layers } = activeConfig;
            
            if (!startCoord) { setLoading(false); return; }
            const match = startCoord.match(/(-?\d+\.\d+)[,\s]+(-?\d+\.\d+)/);
            if (!match) { if(autoFit) alert('請輸入有效的起點座標格式！'); setLoading(false); return; }
            const lat = parseFloat(match[1]); const lon = parseFloat(match[2]);
            if (!isValidCoord(lat, lon)) { if(autoFit) alert('座標數值超出範圍！'); setLoading(false); return; }

            const speed = parseFloat(speedKmH) || 18;
            let pts = [];

            // 旋轉矩陣閉包
            const rad = -(angle || 0) * Math.PI / 180; 
            const cosA = Math.cos(rad); const sinA = Math.sin(rad);
            const rot = (x, y) => ({ x: x*cosA - y*sinA, y: x*sinA + y*cosA });
            const dLonRatio = getLonToMeters(lat);

            if (axis === 'CIRCLE') {
                // 【同心圓麥田圈模式 - 完美補上紅點邏輯】
                pts.push({ lat: lat, lon: lon, name: 'Center' }); // 第一個點：強制加入圓心

                const layersCount = parseInt(layers, 10) || 1;
                for (let l = 0; l < layersCount; l++) {
                    const rMeters = 20 + l * 35; // R1=20m, 每次外推35m
                    const segments = 36; // 每個圓拆成36點 (每10度一個點，模擬極度平滑)
                    for (let i = 0; i <= segments; i++) {
                        const theta = (i / segments) * 2 * Math.PI;
                        const x = rMeters * Math.sin(theta);
                        const y = rMeters * Math.cos(theta);

                        const p = rot(x, y);
                        pts.push({ 
                            lat: lat + p.y / CONSTANTS.LAT_TO_M, 
                            lon: lon + p.x / dLonRatio, 
                            name: `C${l+1}_P${i}` 
                        });
                    }
                }
            } else {
                // 【單向平行 / 矩陣棋盤模式】
                const w = parseFloat(wStr); const r = parseInt(rStr, 10);
                if (isNaN(w) || isNaN(r)) { setLoading(false); return; }
                
                const wMeters = w * 1000;
                const dirX = sweepDir === 'R' ? 1 : -1; // R: 向右(正), L: 向左(負)
                const dirY = advDir === 'F' ? 1 : -1;   // F: 向前(正), B: 向後(負)
                
                let localPts = [];

                // 生成平行線
                for (let i = 0; i < r; i++) {
                    let y = i * CONSTANTS.S2_SPACING_KM * 1000 * dirY;
                    let xStart = i % 2 === 0 ? 0 : wMeters * dirX;
                    let xEnd = i % 2 === 0 ? wMeters * dirX : 0;
                    localPts.push({x: xStart, y: y, n: `L${i+1}_1`}, {x: xEnd, y: y, n: `L${i+1}_2`});
                }

                // 如果是矩陣棋盤，疊加垂直線
                if (axis === 'GRID') {
                    const cols = Math.ceil(wMeters / (CONSTANTS.S2_SPACING_KM * 1000)) + 1;
                    const hMaxY = (r - 1) * CONSTANTS.S2_SPACING_KM * 1000 * dirY;
                    for (let i = 0; i < cols; i++) {
                        let x = i * CONSTANTS.S2_SPACING_KM * 1000 * dirX;
                        let yStart = i % 2 === 0 ? 0 : hMaxY;
                        let yEnd = i % 2 === 0 ? hMaxY : 0;
                        localPts.push({x: x, y: yStart, n: `V${i+1}_1`}, {x: x, y: yEnd, n: `V${i+1}_2`});
                    }
                }

                pts = localPts.map(pt => {
                    const p = rot(pt.x, pt.y);
                    return { lat: lat + p.y / CONSTANTS.LAT_TO_M, lon: lon + p.x / dLonRatio, name: pt.n };
                });
            }

            const td = pts.reduce((acc, p, i) => i===0 ? 0 : acc + calcDistanceKm(pts[i-1], p), 0);
            setStats({ dist: td.toFixed(2), time: Math.round((td / speed) * 60) });

            let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="V36_Map_M2">\n  <trk><name>Sweep_${axis}</name><trkseg>\n`;
            let csv = '';
            pts.forEach(p => { xml += `    <trkpt lat="${p.lat.toFixed(6)}" lon="${p.lon.toFixed(6)}"><name>${p.name}</name></trkpt>\n`; csv += `${p.lat.toFixed(6)}, ${p.lon.toFixed(6)}\n`; });
            xml += `  </trkseg></trk></gpx>`; 
            setGpxOut(xml); setCsvOut(csv);
            
            setGeneratedPts(pts);

            if (autoFit && mapRef.current && pts.length > 0) {
               const bounds = L.latLngBounds(pts.map(p => [p.lat, p.lon]));
               mapRef.current.fitBounds(bounds, { padding: [30, 30] });
            }
          } catch (err) {
            console.error(err);
            if(autoFit) alert('生成發生錯誤，請檢查參數！');
          } finally {
            setLoading(false);
          }
        }, 10);
      }, []);

      useEffect(() => {
        if (!mapRef.current) {
          const map = L.map('leaflet-map-m2').setView([25.033, 121.565], 15);
          mapRef.current = map;
          
          L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19, attribution: '&copy; OpenStreetMap'
          }).addTo(map);

          layerGroupRef.current = L.layerGroup().addTo(map);

          map.on('click', (e) => {
            const newCoord = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            const newConfig = { ...configRef.current, startCoord: newCoord };
            setConfig(newConfig);
            generateGrid(newConfig, false);
          });
        }
        
        return () => {
          if (mapRef.current) {
             mapRef.current.off();
             mapRef.current.remove();
             mapRef.current = null;
          }
        };
      }, [generateGrid]);

      useEffect(() => {
        const group = layerGroupRef.current;
        if (!group) return;
        group.clearLayers();
        
        if (generatedPts.length > 0) {
           const latlngs = generatedPts.map(p => [p.lat, p.lon]);
           const pathColor = isDark ? '#3b82f6' : '#2563eb';
           const isCircle = configRef.current.axis === 'CIRCLE';
           
           L.polyline(latlngs, {
             color: pathColor, weight: 3, opacity: 0.8, dashArray: isCircle ? 'none' : '8, 8'
           }).addTo(group);

           // 統一使用綠色為起點，紅色為終點，保持全模式視覺一致性
           L.circleMarker(latlngs[0], { radius: 6, color: '#16a34a', fillColor: '#16a34a', fillOpacity: 1 }).bindPopup("起點").addTo(group);
           
           L.circleMarker(latlngs[latlngs.length - 1], { radius: 6, color: '#dc2626', fillColor: '#dc2626', fillOpacity: 1 }).bindPopup("終點").addTo(group);
        }
      }, [generatedPts, isDark]);

      const searchLocation = async () => {
        if (!searchQuery) return;
        setLoading(true);
        try {
          const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchQuery)}`);
          const data = await response.json();
          if (data && data.length > 0) {
            const lat = parseFloat(data[0].lat); const lon = parseFloat(data[0].lon);
            if (mapRef.current) mapRef.current.flyTo([lat, lon], 16, { duration: 1.5 });
          } else {
            alert('找不到該地點，請嘗試其他關鍵字');
          }
        } catch (e) {
          console.error('Search error:', e);
        } finally {
          setLoading(false);
        }
      };

      const locateMe = () => {
        if (!navigator.geolocation) return alert('您的瀏覽器不支援定位功能');
        setLoading(true);
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude; const lng = position.coords.longitude;
            if (mapRef.current) mapRef.current.flyTo([lat, lng], 16, { duration: 1.5 });
            setLoading(false);
          },
          (error) => {
            alert('無法取得位置，請確認瀏覽器定位權限');
            setLoading(false);
          },
          { enableHighAccuracy: true, timeout: 5000 }
        );
      };

      const centerPath = () => {
        if (mapRef.current && generatedPts.length > 0) {
            const bounds = L.latLngBounds(generatedPts.map(p => [p.lat, p.lon]));
            mapRef.current.fitBounds(bounds, { padding: [30, 30] });
        }
      };

      const currentOut = outputFormat==='gpx'?gpxOut:csvOut;
      
      const copyToClipboard = () => { 
        if(!currentOut) return;
        const ta = document.createElement('textarea'); ta.value = currentOut; ta.style.position = 'fixed'; 
        document.body.appendChild(ta); ta.select(); 
        try { document.execCommand('copy'); setCopied(true); setTimeout(()=>setCopied(false), 2000); } 
        catch(err) { console.error("複製失敗", err); } 
        finally { document.body.removeChild(ta); }
      };
      
      const dlGPX = () => { 
        if(!currentOut) return;
        const ext = outputFormat === 'gpx' ? 'gpx' : 'txt';
        const mime = outputFormat === 'gpx' ? 'text/xml' : 'text/plain';
        const axisName = config.axis;
        const ts = getTimestamp();
        const filename = `M2_${axisName}_${ts}.${ext}`;
        
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(new Blob([currentOut], {type: mime})); 
        a.download = filename; 
        a.click(); 
      };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-5 flex-1 min-h-0 pb-4 relative transition-colors duration-300">
          {loading && (
            <div className={`absolute inset-0 z-[1000] rounded-xl flex items-center justify-center backdrop-blur-sm transition-colors duration-300 ${isDark ? 'bg-slate-900/40' : 'bg-stone-200/60'}`}>
              <i className={`fas fa-spinner fa-spin text-3xl ${isDark ? 'text-blue-400' : 'text-blue-600'}`}></i>
              <span className={`ml-3 font-bold tracking-widest ${isDark ? 'text-blue-400' : 'text-blue-600'}`}>運算中...</span>
            </div>
          )}
          
          <div className="order-2 lg:order-1 lg:col-span-4 flex flex-col gap-4 h-auto lg:h-full min-h-0 z-20">
            <div className="p-3 sm:p-4 rounded-xl border shrink-0 transition-colors duration-300 bg-stone-100 dark:bg-slate-800 border-stone-300 dark:border-slate-700 shadow-sm dark:shadow-xl">
              <h2 className={`text-xs sm:text-sm font-bold mb-3 flex items-center gap-2 ${isDark ? 'text-blue-400' : 'text-stone-800'}`}><i className="fas fa-crosshairs"></i>幾何矩陣佈線</h2>
              
              <div className="flex gap-2 mb-3">
                <input type="text" className={`flex-grow border rounded-lg p-2 text-xs outline-none transition-colors duration-300 ${isDark ? 'bg-slate-900 border-slate-600 focus:border-slate-500 text-white' : 'bg-stone-200 border-stone-300 focus:border-stone-400 text-stone-800 focus:bg-stone-100'}`} value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} onKeyDown={(e)=>e.key==='Enter' && searchLocation()} placeholder="搜尋起點 (如: 台北車站)" />
                <button onClick={searchLocation} className={`px-3 rounded-lg border transition-colors duration-300 shadow-sm ${isDark ? 'bg-slate-700 hover:bg-slate-600 border-slate-600 text-white' : 'bg-white hover:bg-stone-100 border-stone-300 text-stone-700'}`} title="搜尋"><i className="fas fa-search"></i></button>
                <button onClick={locateMe} className={`px-3 rounded-lg border transition-colors duration-300 shadow-sm ${isDark ? 'bg-slate-700 hover:bg-slate-600 border-slate-600 text-blue-400' : 'bg-white hover:bg-stone-100 border-stone-300 text-blue-600'}`} title="定位我的位置"><i className="fas fa-location-arrow"></i></button>
              </div>

              <input type="text" className={`w-full border rounded p-1.5 text-xs outline-none mb-3 focus:outline-none transition-colors duration-300 ${isDark ? 'bg-slate-900 border-slate-600 focus:border-slate-500 text-white' : 'bg-stone-200 border-stone-300 focus:border-stone-400 text-stone-800 focus:bg-stone-100'}`} value={config.startCoord} onChange={(e)=>setConfig({...config, startCoord: e.target.value})} placeholder="請輸入起點座標..." />
              
              <div className="flex rounded border overflow-hidden mb-3 transition-colors duration-300 bg-stone-200 dark:bg-slate-900 border-stone-300 dark:border-slate-600 shadow-none dark:shadow-inner">
                <button onClick={()=>{const n={...config, axis:'LINE'}; setConfig(n); generateGrid(n, false);}} className={`flex-1 py-1.5 text-[10px] font-bold transition-colors ${config.axis==='LINE' ? (isDark ? 'bg-blue-600 text-white' : 'bg-blue-600 text-white shadow-sm') : (isDark ? 'text-slate-400 hover:bg-slate-700' : 'text-stone-500 hover:text-stone-700')}`}>單向平行</button>
                <button onClick={()=>{const n={...config, axis:'GRID'}; setConfig(n); generateGrid(n, false);}} className={`flex-1 py-1.5 text-[10px] font-bold transition-colors ${config.axis==='GRID' ? (isDark ? 'bg-blue-600 text-white' : 'bg-blue-600 text-white shadow-sm') : (isDark ? 'text-slate-400 hover:bg-slate-700' : 'text-stone-500 hover:text-stone-700')}`}>矩陣棋盤</button>
                <button onClick={()=>{const n={...config, axis:'CIRCLE'}; setConfig(n); generateGrid(n, false);}} className={`flex-1 py-1.5 text-[10px] font-bold transition-colors ${config.axis==='CIRCLE' ? (isDark ? 'bg-blue-600 text-white' : 'bg-blue-600 text-white shadow-sm') : (isDark ? 'text-slate-400 hover:bg-slate-700' : 'text-stone-500 hover:text-stone-700')}`}>同心圓</button>
              </div>

              <div className={`grid ${config.axis === 'CIRCLE' ? 'grid-cols-2' : 'grid-cols-3'} gap-2 mb-3`}>
                {config.axis !== 'CIRCLE' && (
                  <>
                    <div><label className="text-[9px] text-stone-500 block mb-1">單線長度(km)</label><input type="number" step="0.1" className={`w-full border rounded p-1 text-xs outline-none transition-colors duration-300 ${isDark ? 'bg-slate-900 border-slate-600 text-white focus:border-slate-500' : 'bg-stone-200 border-stone-300 text-stone-800 focus:border-stone-400 focus:bg-stone-100'}`} value={config.width} onChange={(e)=>setConfig({...config, width: e.target.value})} onBlur={()=>generateGrid(null, false)} /></div>
                    <div><label className="text-[9px] text-stone-500 block mb-1">平行線數量</label><input type="number" className={`w-full border rounded p-1 text-xs outline-none transition-colors duration-300 ${isDark ? 'bg-slate-900 border-slate-600 text-white focus:border-slate-500' : 'bg-stone-200 border-stone-300 text-stone-800 focus:border-stone-400 focus:bg-stone-100'}`} value={config.rows} onChange={(e)=>setConfig({...config, rows: e.target.value})} onBlur={()=>generateGrid(null, false)} /></div>
                  </>
                )}
                {config.axis === 'CIRCLE' && (
                  <div><label className="text-[9px] text-stone-500 block mb-1 font-bold text-purple-500"><i className="fas fa-bullseye mr-1"></i>同心圓外擴層數</label><input type="number" min="1" max="20" className={`w-full border rounded p-1 text-xs outline-none transition-colors duration-300 font-bold ${isDark ? 'bg-slate-900 border-purple-500/50 text-purple-300 focus:border-purple-400' : 'bg-purple-50 border-purple-300 text-purple-700 focus:border-purple-500'}`} value={config.layers || 1} onChange={(e)=>{let v = parseInt(e.target.value)||1; if(v<1)v=1; setConfig({...config, layers: v})}} onBlur={()=>generateGrid(null, false)} /></div>
                )}
                <div><label className="text-[9px] text-stone-500 block mb-1">時速(km/h)</label><input type="number" className={`w-full border rounded p-1 text-xs outline-none transition-colors duration-300 ${isDark ? 'bg-slate-900 border-slate-600 text-white focus:border-slate-500' : 'bg-stone-200 border-stone-300 text-stone-800 focus:border-stone-400 focus:bg-stone-100'}`} value={config.speedKmH} onChange={(e)=>setConfig({...config, speedKmH: e.target.value})} onBlur={()=>generateGrid(null, false)} /></div>
              </div>
              
              <div className="mb-4 bg-stone-200/50 dark:bg-slate-900/50 p-2 rounded-lg border border-stone-300 dark:border-slate-700 shadow-inner transition-colors duration-300">
                <div className="flex justify-between items-center mb-1">
                  <label className="text-[10px] font-bold text-stone-600 dark:text-slate-400"><i className="fas fa-sync-alt mr-1"></i>網格旋轉微調</label>
                  <div className="flex items-center gap-1">
                    <input type="number" min="0" max="359" className={`w-12 text-center border rounded p-0.5 text-xs outline-none transition-colors duration-300 font-mono ${isDark ? 'bg-slate-800 border-slate-600 text-blue-400 focus:border-blue-500' : 'bg-white border-stone-300 text-blue-600 focus:border-blue-400'}`} value={config.angle || 0} onChange={(e)=>{const n={...config, angle: parseInt(e.target.value)||0}; setConfig(n); generateGrid(n, false);}} />
                    <span className="text-[10px] text-stone-500 dark:text-slate-500 font-bold">°</span>
                  </div>
                </div>
                <input type="range" min="0" max="359" className="w-full h-1.5 bg-stone-300 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-600 hover:accent-blue-500 transition-colors duration-300" value={config.angle || 0} onChange={(e)=>{const n={...config, angle: parseInt(e.target.value)||0}; setConfig(n); generateGrid(n, false);}} />
              </div>

              {config.axis !== 'CIRCLE' && (
                <div className="grid grid-cols-2 gap-2 mb-4">
                  <select className={`w-full border rounded p-1.5 text-[10px] sm:text-xs outline-none transition-colors duration-300 ${isDark ? 'bg-slate-900 border-slate-600 text-white shadow-inner focus:border-slate-500' : 'bg-stone-200 border-stone-300 text-stone-800 focus:border-stone-400 focus:bg-stone-100'}`} value={config.sweepDir} onChange={(e)=>{const n={...config, sweepDir: e.target.value}; setConfig(n); generateGrid(n, false);}}>
                      <option value="R">向右畫線 (→)</option>
                      <option value="L">向左畫線 (←)</option>
                  </select>
                  <select className={`w-full border rounded p-1.5 text-[10px] sm:text-xs outline-none transition-colors duration-300 ${isDark ? 'bg-slate-900 border-slate-600 text-white shadow-inner focus:border-slate-500' : 'bg-stone-200 border-stone-300 text-stone-800 focus:border-stone-400 focus:bg-stone-100'}`} value={config.advDir} onChange={(e)=>{const n={...config, advDir: e.target.value}; setConfig(n); generateGrid(n, false);}}>
                      <option value="F">向前推進 (↑)</option>
                      <option value="B">向後推進 (↓)</option>
                  </select>
                </div>
              )}

              <button onClick={()=>generateGrid(null, true)} disabled={loading} className={`w-full text-white font-bold py-2 rounded-lg active:scale-95 transition text-xs disabled:opacity-50 ${isDark ? 'bg-blue-600 hover:brightness-110 shadow-lg' : 'bg-stone-800 hover:bg-stone-700 shadow-sm'}`}><i className="fas fa-search-location mr-2"></i>生成並置中預覽</button>
            </div>
            
            <div className="flex-1 p-3 sm:p-4 rounded-xl border flex flex-col min-h-[200px] transition-colors duration-300 bg-stone-100 dark:bg-slate-800 border-stone-300 dark:border-slate-700 shadow-sm dark:shadow-xl">
              <div className="flex justify-between items-center mb-2 shrink-0">
                <h2 className={`text-xs sm:text-sm font-bold ${isDark ? 'text-blue-400' : 'text-stone-800'}`}>輸出結果</h2>
                <div className="flex rounded border overflow-hidden transition-colors duration-300 bg-stone-200 dark:bg-slate-900 border-stone-300 dark:border-slate-700">
                    <button onClick={()=>setOutputFormat('gpx')} className={`px-2 py-1 text-[9px] transition-colors ${outputFormat==='gpx' ? (isDark ? 'bg-blue-600 text-white' : 'bg-stone-100 text-stone-800 shadow-sm') : 'text-stone-500 dark:text-slate-400'}`}>GPX</button>
                    <button onClick={()=>setOutputFormat('csv')} className={`px-2 py-1 text-[9px] transition-colors ${outputFormat==='csv' ? (isDark ? 'bg-blue-600 text-white' : 'bg-stone-100 text-stone-800 shadow-sm') : 'text-stone-500 dark:text-slate-400'}`}>座標</button>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-2 mb-2 shrink-0">
                <div className="p-1.5 rounded border text-center transition-colors duration-300 bg-stone-200 dark:bg-slate-900 border-stone-300 dark:border-slate-700"><span className="block text-[9px] text-stone-500">總里程</span><span className={`font-bold text-sm ${isDark ? 'text-blue-400' : 'text-stone-800'}`}>{stats.dist} km</span></div>
                <div className="p-1.5 rounded border text-center transition-colors duration-300 bg-stone-200 dark:bg-slate-900 border-stone-300 dark:border-slate-700"><span className="block text-[9px] text-stone-500">總時間</span><span className={`font-bold text-sm ${isDark ? 'text-blue-400' : 'text-stone-800'}`}>{stats.time} min</span></div>
              </div>
              <div className="relative flex-1 rounded border min-h-[60px] transition-colors duration-300 bg-stone-200 dark:bg-slate-900 border-stone-300 dark:border-slate-700 shadow-inner">
                <textarea className={`w-full h-full bg-transparent text-[9px] p-2 outline-none custom-scrollbar font-mono ${isDark ? 'text-blue-200' : 'text-stone-700'}`} readOnly value={outputFormat==='gpx'?gpxOut:csvOut} placeholder="等待生成..."></textarea>
                {currentOut && <div className="absolute bottom-1 right-1 flex gap-1"><button onClick={copyToClipboard} className={`p-1 rounded active:scale-95 transition ${isDark ? 'bg-slate-700 text-white' : 'bg-stone-100 border border-stone-300 text-stone-600 hover:bg-stone-200'}`}><i className={`fas ${copied?`fa-check ${isDark ? 'text-blue-400' : 'text-stone-800'}`:`fa-copy`} text-[10px]`}></i></button><button onClick={dlGPX} className={`text-white px-2 rounded text-[10px] font-bold active:scale-95 transition shadow-sm ${isDark ? 'bg-blue-600' : 'bg-stone-800 hover:bg-stone-700'}`}><i className="fas fa-download"></i></button></div>}
              </div>
            </div>
          </div>
          
          <div className="order-1 lg:order-2 lg:col-span-8 rounded-xl border relative overflow-hidden min-h-[45vh] lg:h-full flex flex-col pb-4 transition-colors duration-300 bg-stone-100 dark:bg-slate-800/50 border-stone-300 dark:border-slate-700 shadow-sm dark:shadow-2xl z-10">
             <div className="absolute top-2 left-2 z-20 flex gap-2 w-full pr-4 pointer-events-none">
               <span className={`px-2 py-1.5 rounded text-[10px] border shadow-sm dark:shadow-md backdrop-blur pointer-events-auto flex items-center gap-1 font-bold transition-colors duration-300 bg-stone-100/90 dark:bg-slate-900/90 border-stone-300 dark:border-slate-700 ${isDark ? 'text-blue-400' : 'text-stone-800'}`}><i className="fas fa-hand-pointer mr-1 text-blue-500"></i> 點擊地圖設定起點</span>
               <button onClick={centerPath} className="border px-2 py-1.5 rounded text-[10px] pointer-events-auto ml-auto transition active:scale-95 flex items-center gap-1 shadow-sm font-semibold duration-300 bg-stone-200 dark:bg-slate-700/90 border-stone-300 dark:border-slate-600 hover:bg-stone-300 dark:hover:bg-slate-600 text-stone-700 dark:text-white"><i className="fas fa-crosshairs"></i>置中軌跡</button>
             </div>
             
             <div id="leaflet-map-m2" className="absolute inset-0 z-0"></div>
          </div>
        </div>
      );
    }

    // --- 【子元件：模式三 地圖圈地真實 S2 掃蕩】 (維持原樣) ---
    function Mode3({ isDark }) {
      const mapRef = useRef(null);
      const tileLayerRef = useRef(null);
      const drawnLayerRef = useRef(null);
      const resultLayerGroupRef = useRef(null);

      const [s2Level, setS2Level] = useStickyState('17', 'pikmin_v34_m3_level');
      const [pathMode, setPathMode] = useStickyState('vertical-ew', 'pikmin_v34_m3_pathmode');
      const [searchQuery, setSearchQuery] = useState('');
      const [drawnCoords, setDrawnCoords] = useState([]);
      const [pathData, setPathData] = useState([]);
      const [gpxOut, setGpxOut] = useState('');
      const [csvOut, setCsvOut] = useState('');
      const [outputFormat, setOutputFormat] = useState('gpx');
      const [loading, setLoading] = useState(false);
      const [copied, setCopied] = useState(false);
      const [badgeText, setBadgeText] = useState('請在地圖上繪製範圍');

      useEffect(() => {
        if (!mapRef.current) {
          const map = L.map('leaflet-map').setView([25.033, 121.565], 15); 
          mapRef.current = map;
          
          tileLayerRef.current = L.tileLayer(
            'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            { maxZoom: 19, attribution: '&copy; OpenStreetMap' }
          ).addTo(map);

          map.pm.addControls({
            position: 'topleft', drawCircle: false, drawCircleMarker: false,
            drawPolyline: false, drawText: false, cutPolygon: false,
            editMode: true, dragMode: true, removalMode: true, drawMarker: false
          });
          map.pm.setLang('zh_tw');

          resultLayerGroupRef.current = L.layerGroup().addTo(map);

          map.on('pm:create', (e) => {
            if (drawnLayerRef.current) map.removeLayer(drawnLayerRef.current);
            drawnLayerRef.current = e.layer;
            setDrawnCoords(e.layer.getLatLngs()[0].map(p => [p.lat, p.lng]));

            e.layer.on('pm:edit', () => {
              setDrawnCoords(e.layer.getLatLngs()[0].map(p => [p.lat, p.lng]));
            });
          });

          map.on('pm:remove', (e) => {
            if (e.layer === drawnLayerRef.current) {
              drawnLayerRef.current = null;
              setDrawnCoords([]);
              setPathData([]);
              setGpxOut(''); setCsvOut('');
              setBadgeText('請在地圖上繪製範圍');
              resultLayerGroupRef.current.clearLayers();
            }
          });
        }

        return () => {
          if (mapRef.current) {
             mapRef.current.off();
             mapRef.current.remove();
             mapRef.current = null;
          }
        };
      }, []);

      const pointInPolygon = (point, vs) => {
        let x = point[0], y = point[1];
        let inside = false;
        for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
          let xi = vs[i][0], yi = vs[i][1];
          let xj = vs[j][0], yj = vs[j][1];
          let intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
          if (intersect) inside = !inside;
        }
        return inside;
      };

      useEffect(() => {
        if (drawnCoords.length < 3) return;
        setLoading(true);
        setBadgeText('正在運算 S2 網格...');

        setTimeout(() => {
          try {
            let minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
            drawnCoords.forEach(p => {
              if(p[0] < minLat) minLat = p[0]; if(p[0] > maxLat) maxLat = p[0];
              if(p[1] < minLng) minLng = p[1]; if(p[1] > maxLng) maxLng = p[1];
            });

            const level = parseInt(s2Level, 10);
            const stepMap = { 16: 0.00020, 17: 0.00009, 18: 0.00005 };
            const scanStep = stepMap[level] || 0.00009;

            let discoveredCells = new Set();
            for(let lat = minLat; lat <= maxLat; lat += scanStep) {
              for(let lng = minLng; lng <= maxLng; lng += scanStep) {
                if (pointInPolygon([lat, lng], drawnCoords)) {
                  let key = window.S2.latLngToKey(lat, lng, level);
                  discoveredCells.add(key);
                }
              }
            }

            let unsortedPoints = Array.from(discoveredCells).map(key => {
              let latlng = window.S2.keyToLatLng(key);
              return { lat: latlng.lat, lng: latlng.lng };
            });

            let finalPath = [];
            if (unsortedPoints.length > 0) {
                let isVertical = pathMode.startsWith('vertical');
                let primaryDesc = pathMode.endsWith('ew') || pathMode.endsWith('sn'); 
                const tolerance = scanStep * 1.5; 

                let getPrimary = p => isVertical ? p.lng : p.lat;
                let getSecondary = p => isVertical ? p.lat : p.lng;

                unsortedPoints.sort((a, b) => primaryDesc ? getPrimary(b) - getPrimary(a) : getPrimary(a) - getPrimary(b));

                let groups = []; let currentGroup = []; let lastPrimary = null;
                for (let p of unsortedPoints) {
                  let primaryVal = getPrimary(p);
                  if (lastPrimary === null || Math.abs(primaryVal - lastPrimary) < tolerance) {
                    currentGroup.push(p);
                  } else {
                    groups.push(currentGroup);
                    currentGroup = [p];
                  }
                  let sum = 0;
                  for(let gp of currentGroup) sum += getPrimary(gp);
                  lastPrimary = sum / currentGroup.length;
                }
                if (currentGroup.length > 0) groups.push(currentGroup);

                let reverseSecondary = false;
                let defaultSecondaryDesc = isVertical ? true : false; 

                groups.forEach(group => {
                  let desc = reverseSecondary ? !defaultSecondaryDesc : defaultSecondaryDesc;
                  group.sort((a, b) => desc ? getSecondary(b) - getSecondary(a) : getSecondary(a) - getSecondary(b));
                  finalPath.push(...group);
                  reverseSecondary = !reverseSecondary;
                });
            }

            setPathData(finalPath);
            if (finalPath.length === 0) {
              setBadgeText('範圍過小，未能涵蓋網格');
              setGpxOut(''); setCsvOut('');
              if (resultLayerGroupRef.current) resultLayerGroupRef.current.clearLayers();
              setLoading(false);
              return;
            }

            let gpxStr = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="V36_Mode3">\n  <trk><name>S2_Map_Sweep</name><trkseg>\n`;
            let csvStr = '';
            finalPath.forEach(p => {
              gpxStr += `    <trkpt lat="${p.lat.toFixed(6)}" lon="${p.lng.toFixed(6)}"></trkpt>\n`;
              csvStr += `${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}\n`;
            });
            gpxStr += `  </trkseg></trk></gpx>`;
            setGpxOut(gpxStr); setCsvOut(csvStr);
            setBadgeText(`總計涵蓋 ${finalPath.length} 個 S2 網格`);

            const group = resultLayerGroupRef.current;
            group.clearLayers();
            finalPath.forEach((p, idx) => {
              let marker = L.circleMarker([p.lat, p.lng], {
                radius: 4, color: isDark ? '#60a5fa' : '#2563eb', fillColor: isDark ? '#3b82f6' : '#3b82f6',
                fillOpacity: 1, weight: 1, pmIgnore: true
              }).bindPopup(`網格順序: ${idx+1}`);
              group.addLayer(marker);
            });
            let polyline = L.polyline(finalPath.map(p => [p.lat, p.lng]), {
              color: isDark ? '#60a5fa' : '#3b82f6', weight: 3, dashArray: '8, 8', opacity: 0.8, pmIgnore: true
            });
            group.addLayer(polyline);

          } catch(err) {
            console.error(err);
            setBadgeText('運算發生錯誤');
          } finally {
            setLoading(false);
          }
        }, 50);
      }, [drawnCoords, s2Level, pathMode, isDark]);

      const searchLocation = async () => {
        if (!searchQuery) return;
        setLoading(true);
        try {
          const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchQuery)}`);
          const data = await response.json();
          if (data && data.length > 0) {
            const lat = parseFloat(data[0].lat); const lon = parseFloat(data[0].lon);
            if (mapRef.current) mapRef.current.flyTo([lat, lon], 16, { duration: 1.5 });
          } else {
            alert('找不到該地點，請嘗試其他關鍵字');
          }
        } catch (e) {
          console.error('Search error:', e);
        } finally {
          setLoading(false);
        }
      };

      const locateMe = () => {
        if (!navigator.geolocation) return alert('您的瀏覽器不支援定位功能');
        setLoading(true);
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude; const lng = position.coords.longitude;
            if (mapRef.current) mapRef.current.flyTo([lat, lng], 16, { duration: 1.5 });
            setLoading(false);
          },
          (error) => {
            alert('無法取得位置，請確認瀏覽器定位權限');
            setLoading(false);
          },
          { enableHighAccuracy: true, timeout: 5000 }
        );
      };

      const currentOut = outputFormat === 'gpx' ? gpxOut : csvOut;
      const copyToClipboard = () => { 
        if(!currentOut) return;
        navigator.clipboard.writeText(currentOut).then(() => {
           setCopied(true); setTimeout(()=>setCopied(false), 2000);
        });
      };
      
      const dlGPX = () => { 
        if(!currentOut) return;
        const ext = outputFormat === 'gpx' ? 'gpx' : 'txt';
        const mime = outputFormat === 'gpx' ? 'text/xml' : 'text/plain';
        const ts = getTimestamp();
        const filename = `M3_S2_L${s2Level}_${ts}.${ext}`;
        
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(new Blob([currentOut], {type: mime})); 
        a.download = filename; 
        a.click(); 
      };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-5 flex-1 min-h-0 pb-4 relative transition-colors duration-300">
          {loading && (
            <div className={`absolute inset-0 z-[1000] rounded-xl flex items-center justify-center backdrop-blur-sm transition-colors duration-300 ${isDark ? 'bg-slate-900/40' : 'bg-stone-200/60'}`}>
              <i className={`fas fa-spinner fa-spin text-3xl ${isDark ? 'text-blue-400' : 'text-blue-600'}`}></i>
              <span className={`ml-3 font-bold tracking-widest ${isDark ? 'text-blue-400' : 'text-blue-600'}`}>地圖定位與運算中...</span>
            </div>
          )}
          <div className="lg:col-span-4 flex flex-col gap-4 h-[500px] lg:h-full min-h-0 z-20">
            <div className="p-3 sm:p-4 rounded-xl border shrink-0 transition-colors duration-300 bg-stone-100 dark:bg-slate-800 border-stone-300 dark:border-slate-700 shadow-sm dark:shadow-xl">
              <h2 className={`text-xs sm:text-sm font-bold mb-3 ${isDark ? 'text-blue-400' : 'text-stone-800'}`}><i className="fas fa-draw-polygon mr-2"></i>地圖圈地控制</h2>
              
              <div className="flex gap-2 mb-4">
                <input type="text" className={`flex-grow border rounded-lg p-2 text-xs outline-none transition-colors duration-300 ${isDark ? 'bg-slate-900 border-slate-600 focus:border-slate-500 text-white' : 'bg-stone-200 border-stone-300 focus:border-stone-400 text-stone-800 focus:bg-stone-100'}`} value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} onKeyDown={(e)=>e.key==='Enter' && searchLocation()} placeholder="搜尋地點 (如: 大安森林公園)" />
                <button onClick={searchLocation} className={`px-3 rounded-lg border transition-colors duration-300 shadow-sm ${isDark ? 'bg-slate-700 hover:bg-slate-600 border-slate-600 text-white' : 'bg-white hover:bg-stone-100 border-stone-300 text-stone-700'}`} title="搜尋"><i className="fas fa-search"></i></button>
                <button onClick={locateMe} className={`px-3 rounded-lg border transition-colors duration-300 shadow-sm ${isDark ? 'bg-slate-700 hover:bg-slate-600 border-slate-600 text-blue-400' : 'bg-white hover:bg-stone-100 border-stone-300 text-blue-600'}`} title="定位我的位置"><i className="fas fa-location-arrow"></i></button>
              </div>

              <div className="space-y-3">
                <div>
                  <label className="text-[10px] font-semibold block mb-1 text-stone-500 dark:text-slate-400">S2 網格精確度層級</label>
                  <select className={`w-full border rounded-lg p-2 text-xs outline-none transition-colors duration-300 ${isDark ? 'bg-slate-900 border-slate-600 text-white focus:border-slate-500' : 'bg-stone-200 border-stone-300 text-stone-800 focus:border-stone-400 focus:bg-stone-100'}`} value={s2Level} onChange={(e)=>setS2Level(e.target.value)}>
                    <option value="16">Level 16</option>
                    <option value="17">Level 17 (補給站/大花/預設)</option>
                    <option value="18">Level 18</option>
                  </select>
                </div>
                <div>
                  <label className="text-[10px] font-semibold block mb-1 text-stone-500 dark:text-slate-400">路線演算模式</label>
                  <select className={`w-full border rounded-lg p-2 text-xs outline-none transition-colors duration-300 ${isDark ? 'bg-slate-900 border-slate-600 text-white focus:border-slate-500' : 'bg-stone-200 border-stone-300 text-stone-800 focus:border-stone-400 focus:bg-stone-100'}`} value={pathMode} onChange={(e)=>setPathMode(e.target.value)}>
                    <option value="vertical-ew">縱向 S 型 (東至西 / 右至左)</option>
                    <option value="vertical-we">縱向 S 型 (西至東 / 左至右)</option>
                  </select>
                </div>
              </div>
            </div>
            
            <div className="flex-1 p-3 sm:p-4 rounded-xl border flex flex-col min-h-[200px] transition-colors duration-300 bg-stone-100 dark:bg-slate-800 border-stone-300 dark:border-slate-700 shadow-sm dark:shadow-xl">
              <div className="flex justify-between items-center mb-2 shrink-0">
                <h2 className={`text-xs sm:text-sm font-bold ${isDark ? 'text-blue-400' : 'text-stone-800'}`}>圈地結果與輸出</h2>
                <div className="flex rounded border overflow-hidden transition-colors duration-300 bg-stone-200 dark:bg-slate-900 border-stone-300 dark:border-slate-700">
                    <button onClick={()=>setOutputFormat('gpx')} className={`px-2 py-1 text-[9px] transition-colors ${outputFormat==='gpx' ? (isDark ? 'bg-blue-600 text-white' : 'bg-stone-100 text-stone-800 shadow-sm') : 'text-stone-500 dark:text-slate-400'}`}>GPX</button>
                    <button onClick={()=>setOutputFormat('csv')} className={`px-2 py-1 text-[9px] transition-colors ${outputFormat==='csv' ? (isDark ? 'bg-blue-600 text-white' : 'bg-stone-100 text-stone-800 shadow-sm') : 'text-stone-500 dark:text-slate-400'}`}>座標</button>
                </div>
              </div>
              <div className="mb-2 shrink-0">
                <span className={`block w-full p-2 rounded-lg border text-center text-xs font-bold transition-colors duration-300 ${pathData.length > 0 ? (isDark ? 'bg-blue-900/50 border-blue-700 text-blue-300' : 'bg-blue-50 border-blue-200 text-blue-700') : (isDark ? 'bg-slate-900 border-slate-700 text-slate-500' : 'bg-stone-200 border-stone-300 text-stone-500')}`}>
                  {badgeText}
                </span>
              </div>
              <div className="relative flex-1 rounded-lg border min-h-[60px] transition-colors duration-300 bg-stone-200 dark:bg-slate-900 border-stone-300 dark:border-slate-700 shadow-inner">
                <textarea className={`w-full h-full bg-transparent text-[9px] p-2 outline-none custom-scrollbar font-mono ${isDark ? 'text-blue-200' : 'text-stone-700'}`} readOnly value={currentOut} placeholder="請使用右側地圖的左上方多邊形工具，畫出您想涵蓋的範圍..."></textarea>
                {currentOut && <div className="absolute bottom-2 right-2 flex gap-1.5"><button onClick={copyToClipboard} className={`p-1.5 rounded active:scale-95 transition ${isDark ? 'bg-slate-700 text-white' : 'bg-stone-100 border border-stone-300 text-stone-600 hover:bg-stone-200'}`}><i className={`fas ${copied?`fa-check ${isDark ? 'text-blue-400' : 'text-stone-800'}`:`fa-copy`} text-[11px]`}></i></button><button onClick={dlGPX} className={`text-white px-3 rounded text-[11px] font-bold active:scale-95 transition shadow-sm ${isDark ? 'bg-blue-600 hover:bg-blue-500' : 'bg-stone-800 hover:bg-stone-700'}`}><i className="fas fa-download mr-1"></i> 下載</button></div>}
              </div>
            </div>
          </div>
          
          <div className="lg:col-span-8 rounded-xl border relative overflow-hidden min-h-[50vh] lg:h-full flex flex-col transition-colors duration-300 bg-stone-100 dark:bg-slate-800/50 border-stone-300 dark:border-slate-700 shadow-sm dark:shadow-2xl z-10">
            <div id="leaflet-map" className="absolute inset-0 z-0"></div>
          </div>
        </div>
      );
    }

    function App() {
      const [appMode, setAppMode] = useStickyState('mode1', 'pikmin_v36_appmode');
      const [isDark, setIsDark] = useStickyState(true, 'pikmin_v36_theme_is_dark');

      useEffect(() => {
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.body.className = "bg-[#0f172a] text-slate-200 bg-grid transition-colors duration-300";
        } else {
          document.documentElement.classList.remove('dark');
          document.body.className = "bg-[#e7e5e4] text-stone-800 bg-dots transition-colors duration-300";
        }
      }, [isDark]);

      return (
        <div className="lg:h-screen min-h-screen flex flex-col p-2 sm:p-4">
          <div className="max-w-[1600px] w-full mx-auto flex-1 flex flex-col min-h-0">
            <div className="flex flex-col sm:flex-row justify-between items-center mb-3 p-3 rounded-xl border shrink-0 transition-colors duration-300 bg-stone-100 dark:bg-slate-800 border-stone-300 dark:border-slate-700 shadow-sm dark:shadow-lg">
              <div className="flex items-center gap-3 px-2">
                <i className={`fab fa-neos text-2xl ${isDark ? 'text-emerald-400' : 'text-stone-800'}`}></i>
                <div>
                  <h1 className={`text-base font-black tracking-wider uppercase ${isDark ? 'text-white' : 'text-stone-800'}`}>PIKMIN NAVIGATOR</h1>
                  <p className="text-[9px] tracking-widest flex items-center gap-1 text-stone-500 dark:text-slate-400">TACTICAL ROUTE PLANNER V36<span className="border px-1 rounded-sm text-[8px] font-bold shadow-sm transition-colors duration-300 bg-stone-200 dark:bg-blue-500 text-stone-700 dark:text-white border-stone-300 dark:border-transparent">一直在改版</span></p>
                </div>
              </div>
              <div className="flex rounded-lg p-1 border w-full sm:w-auto mt-2 sm:mt-0 transition-colors duration-300 bg-stone-200 dark:bg-slate-900 border-stone-300 dark:border-slate-700 overflow-x-auto custom-scrollbar">
                <button onClick={()=>setAppMode('mode1')} className={`flex-1 sm:flex-none px-3 sm:px-5 py-1.5 rounded-md text-[11px] sm:text-xs font-bold transition-colors whitespace-nowrap ${appMode==='mode1' ? (isDark ? 'bg-emerald-500 text-slate-900' : 'bg-stone-100 text-stone-800 shadow-sm') : (isDark ? 'text-slate-400 hover:text-emerald-400' : 'text-stone-500 hover:text-stone-700')}`}><i className="fas fa-crosshairs mr-1"></i> 精準控花</button>
                <button onClick={()=>setAppMode('mode2')} className={`flex-1 sm:flex-none px-3 sm:px-5 py-1.5 rounded-md text-[11px] sm:text-xs font-bold transition-colors whitespace-nowrap ${appMode==='mode2' ? (isDark ? 'bg-blue-500 text-slate-900' : 'bg-stone-100 text-stone-800 shadow-sm') : (isDark ? 'text-slate-400 hover:text-blue-400' : 'text-stone-500 hover:text-stone-700')}`}><i className="fas fa-border-all mr-1"></i> 盲掃佈線</button>
                <button onClick={()=>setAppMode('mode3')} className={`flex-1 sm:flex-none px-3 sm:px-5 py-1.5 rounded-md text-[11px] sm:text-xs font-bold transition-colors whitespace-nowrap ${appMode==='mode3' ? (isDark ? 'bg-blue-600 text-white' : 'bg-stone-100 text-stone-800 shadow-sm') : (isDark ? 'text-slate-400 hover:text-blue-400' : 'text-stone-500 hover:text-stone-700')}`}><i className="fas fa-draw-polygon mr-1"></i> 地圖圈地</button>
                
                <div className="w-px mx-1 transition-colors duration-300 bg-stone-300 dark:bg-slate-700 shrink-0"></div>
                
                <button onClick={()=>setIsDark(!isDark)} className="w-9 sm:w-10 flex justify-center items-center py-1.5 rounded-md text-sm font-bold transition-colors text-stone-500 dark:text-slate-400 hover:text-amber-600 dark:hover:text-amber-300 shrink-0" title={isDark ? "切換至明亮模式" : "切換至深色模式"}>
                  <i className={`fas fa-fw ${isDark ? 'fa-sun' : 'fa-moon'}`}></i>
                </button>
              </div>
            </div>
            <div className="flex-1 min-h-0 flex flex-col">
              {appMode==='mode1' && <Mode1 isDark={isDark} />}
              {appMode==='mode2' && <Mode2 isDark={isDark} />}
              {appMode==='mode3' && <Mode3 isDark={isDark} />}
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
