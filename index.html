  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect, useCallback } = React;

    const CONSTANTS = {
      LAT_TO_M: 111132,             
      FLW_SAFE_RADIUS_M: 25,        // 【實戰修正】從 20 改為 25，外擴極致貼邊 40m
      FLW_MAX_RADIUS_M: 40,         
      S2_SPACING_KM: 0.0778,        
      MIN_LAT: -90, MAX_LAT: 90,    
      MIN_LON: -180, MAX_LON: 180   
    };

    const isValidCoord = (lat, lon) => !isNaN(lat) && !isNaN(lon) && lat >= CONSTANTS.MIN_LAT && lat <= CONSTANTS.MAX_LAT && lon >= CONSTANTS.MIN_LON && lon <= CONSTANTS.MAX_LON;
    const getLonToMeters = (lat) => CONSTANTS.LAT_TO_M * Math.cos((lat * Math.PI) / 180);
    const calcDistanceKm = (p1, p2) => Math.hypot((p1.lat - p2.lat) * (CONSTANTS.LAT_TO_M / 1000), (p1.lon - p2.lon) * (getLonToMeters(p1.lat) / 1000));
    const calcDistanceM = (p1, p2) => Math.hypot((p1.lat - p2.lat) * CONSTANTS.LAT_TO_M, (p1.lon - p2.lon) * getLonToMeters(p1.lat));

    const getTimestamp = () => {
      const d = new Date();
      return `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}${String(d.getSeconds()).padStart(2, '0')}`;
    };

    const getTheme = (type, isDark) => {
      if (isDark) {
        return {
          'S': { badgeBg: 'bg-emerald-600', badgeText: 'text-white', bg: 'bg-emerald-600', hoverBg: 'hover:brightness-110', text: 'text-emerald-400', ring: 'focus:ring-emerald-500', hexMain: '#10b981', hexLine: '#34d399', icon: 'text-emerald-400', toastBg: 'bg-emerald-600', outputText: 'text-emerald-400' },
          'N': { badgeBg: 'bg-amber-600', badgeText: 'text-white', bg: 'bg-amber-600', hoverBg: 'hover:brightness-110', text: 'text-amber-400', ring: 'focus:ring-amber-500', hexMain: '#f59e0b', hexLine: '#fbbf24', icon: 'text-amber-400', toastBg: 'bg-amber-600', outputText: 'text-amber-400' },
          'O': { badgeBg: 'bg-purple-600', badgeText: 'text-white', bg: 'bg-purple-600', hoverBg: 'hover:brightness-110', text: 'text-purple-400', ring: 'focus:ring-purple-500', hexMain: '#a855f7', hexLine: '#c084fc', icon: 'text-purple-400', toastBg: 'bg-purple-600', outputText: 'text-purple-400' }
        }[type] || getTheme('S', true);
      } else {
        return {
          'S': { badgeBg: 'bg-emerald-200', badgeText: 'text-emerald-900', bg: 'bg-stone-800', hoverBg: 'hover:bg-stone-700', text: 'text-emerald-700', ring: 'focus:ring-emerald-500', hexMain: '#059669', hexLine: '#047857', icon: 'text-emerald-600', toastBg: 'bg-stone-800', outputText: 'text-stone-700' },
          'N': { badgeBg: 'bg-amber-200', badgeText: 'text-amber-900', bg: 'bg-stone-800', hoverBg: 'hover:bg-stone-700', text: 'text-amber-700', ring: 'focus:ring-amber-500', hexMain: '#d97706', hexLine: '#b45309', icon: 'text-amber-600', toastBg: 'bg-stone-800', outputText: 'text-stone-700' },
          'O': { badgeBg: 'bg-indigo-200', badgeText: 'text-indigo-900', bg: 'bg-stone-800', hoverBg: 'hover:bg-stone-700', text: 'text-indigo-700', ring: 'focus:ring-indigo-500', hexMain: '#6366f1', hexLine: '#4f46e5', icon: 'text-indigo-600', toastBg: 'bg-stone-800', outputText: 'text-stone-700' }
        }[type] || getTheme('S', false);
      }
    };

    function useStickyState(defaultValue, key) {
      const [value, setValue] = useState(() => {
        const stickyValue = window.localStorage.getItem(key);
        return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
      });
      useEffect(() => { window.localStorage.setItem(key, JSON.stringify(value)); }, [key, value]);
      return [value, setValue];
    }

    // --- SVG Map Interaction Hook ---
    function useInteractiveMap(svgRef, transformRef, setTransform) {
      useEffect(() => {
        const svg = svgRef.current; if (!svg) return;
        let isDrag = false; let dStart = { clientX: 0, clientY: 0, x: 0, y: 0 }; let pDist = null; let lCenter = null;
        let rafId = null; 
        const getRatios = () => { const rect = svg.getBoundingClientRect(); return { rx: 2000 / rect.width, ry: 2000 / rect.height, rect }; };

        const updateTransform = (newTransform) => {
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(() => setTransform(newTransform));
        };

        const onWheel = (e) => {
          e.preventDefault(); const cur = transformRef.current;
          let nk = e.deltaY < 0 ? cur.k * 1.1 : cur.k / 1.1;
          if (nk < 0.01) nk = 0.01; if (nk > 50) nk = 50;
          const { rx, ry, rect } = getRatios();
          const mx = (e.clientX - rect.left) * rx; const my = (e.clientY - rect.top) * ry;
          updateTransform({ k: nk, x: mx - (mx - cur.x)*(nk/cur.k), y: my - (my - cur.y)*(nk/cur.k) });
        };

        const onTs = (e) => {
          if (e.touches.length === 1) {
            isDrag = true; const cur = transformRef.current;
            dStart = { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY, x: cur.x, y: cur.y };
          } else if (e.touches.length === 2) {
            isDrag = false; const t1 = e.touches[0]; const t2 = e.touches[1];
            pDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            lCenter = { clientX: (t1.clientX + t2.clientX) / 2, clientY: (t1.clientY + t2.clientY) / 2 };
          }
        };

        const onTm = (e) => {
          e.preventDefault(); const cur = transformRef.current; const { rx, ry, rect } = getRatios();
          if (e.touches.length === 1 && isDrag) {
            const dx = (e.touches[0].clientX - dStart.clientX) * rx; const dy = (e.touches[0].clientY - dStart.clientY) * ry;
            updateTransform({ ...cur, x: dStart.x + dx, y: dStart.y + dy });
          } else if (e.touches.length === 2 && pDist && lCenter) {
            const t1 = e.touches[0]; const t2 = e.touches[1];
            const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            const cClientX = (t1.clientX + t2.clientX) / 2; const cClientY = (t1.clientY + t2.clientY) / 2;
            let nk = cur.k * (dist / pDist); if (nk < 0.01) nk = 0.01; if (nk > 50) nk = 50;
            const mx = (cClientX - rect.left) * rx; const my = (cClientY - rect.top) * ry;
            const dx = (cClientX - lCenter.clientX) * rx; const dy = (cClientY - lCenter.clientY) * ry;
            updateTransform({ k: nk, x: mx - (mx - cur.x)*(nk/cur.k) + dx, y: my - (my - cur.y)*(nk/cur.k) + dy });
            pDist = dist; lCenter = { clientX: cClientX, clientY: cClientY };
          }
        };

        const onTe = (e) => {
          if (e.touches.length < 2) { pDist = null; lCenter = null; }
          if (e.touches.length === 0) isDrag = false;
          if (e.touches.length === 1) { 
            isDrag = true; const cur = transformRef.current;
            dStart = { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY, x: cur.x, y: cur.y };
          }
        };

        const onMd = (e) => { isDrag = true; dStart = { clientX: e.clientX, clientY: e.clientY, x: transformRef.current.x, y: transformRef.current.y }; };
        const onMm = (e) => {
          if (!isDrag) return; const { rx, ry } = getRatios();
          const dx = (e.clientX - dStart.clientX) * rx; const dy = (e.clientY - dStart.clientY) * ry;
          updateTransform({ ...transformRef.current, x: dStart.x + dx, y: dStart.y + dy });
        };
        const onMu = () => { isDrag = false; if(rafId) cancelAnimationFrame(rafId); };

        svg.addEventListener('wheel', onWheel, { passive: false });
        svg.addEventListener('touchstart', onTs, { passive: false });
        svg.addEventListener('touchmove', onTm, { passive: false });
        svg.addEventListener('touchend', onTe); svg.addEventListener('touchcancel', onTe);
        svg.addEventListener('mousedown', onMd); window.addEventListener('mousemove', onMm); window.addEventListener('mouseup', onMu);
        return () => {
          svg.removeEventListener('wheel', onWheel); svg.removeEventListener('touchstart', onTs); svg.removeEventListener('touchmove', onTm); svg.removeEventListener('touchcancel', onTe);
          svg.removeEventListener('mousedown', onMd); window.removeEventListener('mousemove', onMm); window.removeEventListener('mouseup', onMu);
          if (rafId) cancelAnimationFrame(rafId);
        };
      }, []); 
    }

      const ANGLES = [{value:0,label:'0°(直)'},{value:45,label:'45°'},{value:90,label:'90°(橫)'},{value:135,label:'135°'},{value:180,label:'180°'},{value:225,label:'225°'},{value:270,label:'270°'},{value:315,label:'315°'}];
      const O_DIRECTIONS = { 'AUTO': '自動判斷', 'CW': '強制順時針', 'CCW': '強制逆時針' };

      const [rawInput, setRawInput] = useStickyState('', 'pikmin_v34_m1_input');

      const [patternType, setPatternType] = useStickyState('O', 'pikmin_v34_m1_pattern');
      
      const [points, setPoints] = useState([]);

      const [outputTab, setOutputTab] = useState('planting');
      const [outputFormat, setOutputFormat] = useState('gpx'); 
      const [copied, setCopied] = useState(false);
      const [stats, setStats] = useState({ distKm: 0, timeMin: 0 });
      const [toastMsg, setToastMsg] = useState('');
      const [diagnosticMsg, setDiagnosticMsg] = useState(null);
      const [loading, setLoading] = useState(false);

      const svgRef = useRef(null);
      const [transform, setTransform] = useState({ k: 1, x: 0, y: 0 });

      const handleParse = useCallback(() => {
        setLoading(true);
        setTimeout(() => {
          try {
              const lines = rawInput.split('\n');
              const newPoints = []; let idCounter = 1;
              const seenCoords = new Set();
              let duplicateCount = 0; let totalCount = 0; let invalidCount = 0;
              
              lines.forEach(line => {
                const match = line.match(/(-?\d+\.\d+)[,\s]+(-?\d+\.\d+)/);
                if (match) {
                  totalCount++;
                  const lat = parseFloat(match[1]); const lon = parseFloat(match[2]);
                  if (isValidCoord(lat, lon)) {
                      const coordKey = `${lat.toFixed(6)},${lon.toFixed(6)}`;
                      if (!seenCoords.has(coordKey)) {
                        seenCoords.add(coordKey);
                        newPoints.push({ id: idCounter++, lat, lon, dir: 'NW_SE', angle: 0 });
                      } else { duplicateCount++; }
                  } else { invalidCount++; }
                }
              });
              setPoints(calcDirs(newPoints)); 
              setOutputs({ plantingGpx: '', plantingCsv: '', fruitGpx: '', fruitCsv: '', pureGpx: '', pureCsv: '' });

                 if (invalidCount > 0) msg += ` (忽略 ${invalidCount} 錯誤座標)`;
                 setToastMsg(msg);
                 setTimeout(() => setToastMsg(''), 3500);
              }
          } catch (e) {
              setToastMsg(`解析錯誤：請檢查座標格式！`);
              setTimeout(() => setToastMsg(''), 3000);
          } finally {
              setLoading(false);
          }

        return pts.map((pt, i) => {
          let dir = 'NW_SE';
          if (i === 0) {

          } else {
            const prev = pts[i - 1]; const dLat = pt.lat - prev.lat; const dLon = pt.lon - prev.lon;
            dir = dLon > 0 ? (dLat > 0 ? 'SW_NE' : 'NW_SE') : (dLat > 0 ? 'SE_NW' : 'NE_SW');
          }
          return { ...pt, dir };
        });
      };

      const handleOptimize = useCallback(() => {
        if (points.length <= 1) return;
        setLoading(true);
        setTimeout(() => {
          try {
            let unv = [...points]; let cur = unv.shift(); let opt = [cur];
            while (unv.length > 0) {
              let nIdx = 0; let minD = Infinity;
              for (let i = 0; i < unv.length; i++) {
                const dist = calcDistanceKm(cur, unv[i]);
                if (dist < minD) { minD = dist; nIdx = i; }
              }
              cur = unv[nIdx]; opt.push(cur); unv.splice(nIdx, 1);
            }

            let improved = true;
            while (improved) {
              improved = false;
              for (let i = 1; i < opt.length - 2; i++) {
                for (let j = i + 1; j < opt.length - 1; j++) {
                  const d1 = calcDistanceKm(opt[i-1], opt[i]) + calcDistanceKm(opt[j], opt[j+1]);
                  const d2 = calcDistanceKm(opt[i-1], opt[j]) + calcDistanceKm(opt[i], opt[j+1]);
                  if (d2 < d1) {
                    const rev = opt.slice(i, j + 1).reverse();
                    opt.splice(i, j - i + 1, ...rev);
                    improved = true;
                  }
                }
              }
            }
            setPoints(calcDirs(opt));
            setToastMsg('✨ 2-opt 交叉解纏演算法 最佳化完成！');
            setTimeout(() => setToastMsg(''), 3000);
          } catch (e) {
            setToastMsg(`最佳化錯誤：${e.message}`);
            setTimeout(() => setToastMsg(''), 3000);
          } finally {
            setLoading(false);
          }
        }, 10);
      }, [points]);

      const updatePoint = (idx, field, val) => { const n = [...points]; n[idx][field] = val; setPoints(n); };
      const movePoint = (idx, dir) => {
        if ((dir === -1 && idx === 0) || (dir === 1 && idx === points.length - 1)) return;
        const n = [...points]; const tmp = n[idx]; n[idx] = n[idx + dir]; n[idx + dir] = tmp; setPoints(n);
      };
      const deletePoint = (idx) => { const n = [...points]; n.splice(idx, 1); setPoints(n); };

      const getFlwPts = (pt, idx = 0, allPts = [], type = patternType) => {
        const { lat, lon, dir, angle } = pt; 
        let b = [];
        
        if (type === 'O') {
            let outAngle = 0; let inAngle = 0;
            if (allPts.length > 0 && idx < allPts.length - 1) {
                const next = allPts[idx + 1]; const dLon = (next.lon - lon) * Math.PI / 180;
                const lat1 = lat * Math.PI / 180; const lat2 = next.lat * Math.PI / 180;
                outAngle = Math.atan2(Math.sin(dLon) * Math.cos(lat2), Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon));
            } else if (allPts.length > 0 && idx > 0) {
                const prev = allPts[idx - 1]; const dLon = (lon - prev.lon) * Math.PI / 180;
                const lat1 = prev.lat * Math.PI / 180; const lat2 = lat * Math.PI / 180;
                outAngle = Math.atan2(Math.sin(dLon) * Math.cos(lat2), Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon));
            }
            if (allPts.length > 0 && idx > 0) {
                const prev = allPts[idx - 1]; const dLon = (lon - prev.lon) * Math.PI / 180;
                const lat1 = prev.lat * Math.PI / 180; const lat2 = lat * Math.PI / 180;
                inAngle = Math.atan2(Math.sin(dLon) * Math.cos(lat2), Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon));
            } else { inAngle = outAngle; }

            outAngle += (angle * Math.PI) / 180;
            const arrivalAngle = inAngle + Math.PI; 
            
            // 【實戰修正】將 8 邊形暴力升級為 32 邊形平滑真圓
            const POINT_COUNT = 32;
            const ANGLE_STEP = (2 * Math.PI) / POINT_COUNT;
            
            const cwP1 = outAngle - (POINT_COUNT - 1) * ANGLE_STEP;

    const CONSTANTS = {
      LAT_TO_M: 111132,

      FLW_MAX_RADIUS_M: 40,         // 大花極限半徑

    const isValidCoord = (lat, lon) => !isNaN(lat) && !isNaN(lon) && lat >= CONSTANTS.MIN_LAT && lat <= CONSTANTS.MAX_LAT && lon >= CONSTANTS.MIN_LON && lon <= CONSTANTS.MAX_LON;
    const getLonToMeters = (lat) => CONSTANTS.LAT_TO_M * Math.cos((lat * Math.PI) / 180);
    const calcDistanceKm = (p1, p2) => Math.hypot((p1.lat - p2.lat) * (CONSTANTS.LAT_TO_M / 1000), (p1.lon - p2.lon) * (getLonToMeters(p1.lat) / 1000));
    const calcDistanceM = (p1, p2) => Math.hypot((p1.lat - p2.lat) * CONSTANTS.LAT_TO_M, (p1.lon - p2.lon) * getLonToMeters(p1.lat));

    const getTimestamp = () => {
      const d = new Date();
      return `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}${String(d.getSeconds()).padStart(2, '0')}`;
    };

    const getTheme = (type, isDark) => {
      if (isDark) {
        return {
          'S': { badgeBg: 'bg-emerald-600', badgeText: 'text-white', bg: 'bg-emerald-600', hoverBg: 'hover:brightness-110', text: 'text-emerald-400', ring: 'focus:ring-emerald-500', hexMain: '#10b981', hexLine: '#34d399', icon: 'text-emerald-400', toastBg: 'bg-emerald-600', outputText: 'text-emerald-400' },
          'N': { badgeBg: 'bg-amber-600', badgeText: 'text-white', bg: 'bg-amber-600', hoverBg: 'hover:brightness-110', text: 'text-amber-400', ring: 'focus:ring-amber-500', hexMain: '#f59e0b', hexLine: '#fbbf24', icon: 'text-amber-400', toastBg: 'bg-amber-600', outputText: 'text-amber-400' },
          'O': { badgeBg: 'bg-purple-600', badgeText: 'text-white', bg: 'bg-purple-600', hoverBg: 'hover:brightness-110', text: 'text-purple-400', ring: 'focus:ring-purple-500', hexMain: '#a855f7', hexLine: '#c084fc', icon: 'text-purple-400', toastBg: 'bg-purple-600', outputText: 'text-purple-400' }
        }[type] || getTheme('S', true);
      } else {
        return {
          'S': { badgeBg: 'bg-emerald-200', badgeText: 'text-emerald-900', bg: 'bg-stone-800', hoverBg: 'hover:bg-stone-700', text: 'text-emerald-700', ring: 'focus:ring-emerald-500', hexMain: '#059669', hexLine: '#047857', icon: 'text-emerald-600', toastBg: 'bg-stone-800', outputText: 'text-stone-700' },
          'N': { badgeBg: 'bg-amber-200', badgeText: 'text-amber-900', bg: 'bg-stone-800', hoverBg: 'hover:bg-stone-700', text: 'text-amber-700', ring: 'focus:ring-amber-500', hexMain: '#d97706', hexLine: '#b45309', icon: 'text-amber-600', toastBg: 'bg-stone-800', outputText: 'text-stone-700' },
          'O': { badgeBg: 'bg-indigo-200', badgeText: 'text-indigo-900', bg: 'bg-stone-800', hoverBg: 'hover:bg-stone-700', text: 'text-indigo-700', ring: 'focus:ring-indigo-500', hexMain: '#6366f1', hexLine: '#4f46e5', icon: 'text-indigo-600', toastBg: 'bg-stone-800', outputText: 'text-stone-700' }
        }[type] || getTheme('S', false);
      }
    };

    function useStickyState(defaultValue, key) {
      const [value, setValue] = useState(() => {
        const stickyValue = window.localStorage.getItem(key);
        return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
      });
      useEffect(() => { window.localStorage.setItem(key, JSON.stringify(value)); }, [key, value]);
      return [value, setValue];
    }

    // --- SVG Map Interaction Hook ---
    function useInteractiveMap(svgRef, transformRef, setTransform) {
      useEffect(() => {
        const svg = svgRef.current; if (!svg) return;
        let isDrag = false; let dStart = { clientX: 0, clientY: 0, x: 0, y: 0 }; let pDist = null; let lCenter = null;
        let rafId = null; 
        const getRatios = () => { const rect = svg.getBoundingClientRect(); return { rx: 2000 / rect.width, ry: 2000 / rect.height, rect }; };

        const updateTransform = (newTransform) => {
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(() => setTransform(newTransform));
        };

        const onWheel = (e) => {
          e.preventDefault(); const cur = transformRef.current;
          let nk = e.deltaY < 0 ? cur.k * 1.1 : cur.k / 1.1;
          if (nk < 0.01) nk = 0.01; if (nk > 50) nk = 50;
          const { rx, ry, rect } = getRatios();
          const mx = (e.clientX - rect.left) * rx; const my = (e.clientY - rect.top) * ry;
          updateTransform({ k: nk, x: mx - (mx - cur.x)*(nk/cur.k), y: my - (my - cur.y)*(nk/cur.k) });
        };

        const onTs = (e) => {
          if (e.touches.length === 1) {
            isDrag = true; const cur = transformRef.current;
            dStart = { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY, x: cur.x, y: cur.y };
          } else if (e.touches.length === 2) {
            isDrag = false; const t1 = e.touches[0]; const t2 = e.touches[1];
            pDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            lCenter = { clientX: (t1.clientX + t2.clientX) / 2, clientY: (t1.clientY + t2.clientY) / 2 };
          }
        };

        const onTm = (e) => {
          e.preventDefault(); const cur = transformRef.current; const { rx, ry, rect } = getRatios();
          if (e.touches.length === 1 && isDrag) {
            const dx = (e.touches[0].clientX - dStart.clientX) * rx; const dy = (e.touches[0].clientY - dStart.clientY) * ry;
            updateTransform({ ...cur, x: dStart.x + dx, y: dStart.y + dy });
          } else if (e.touches.length === 2 && pDist && lCenter) {
            const t1 = e.touches[0]; const t2 = e.touches[1];
            const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            const cClientX = (t1.clientX + t2.clientX) / 2; const cClientY = (t1.clientY + t2.clientY) / 2;
            let nk = cur.k * (dist / pDist); if (nk < 0.01) nk = 0.01; if (nk > 50) nk = 50;
            const mx = (cClientX - rect.left) * rx; const my = (cClientY - rect.top) * ry;
            const dx = (cClientX - lCenter.clientX) * rx; const dy = (cClientY - lCenter.clientY) * ry;
            updateTransform({ k: nk, x: mx - (mx - cur.x)*(nk/cur.k) + dx, y: my - (my - cur.y)*(nk/cur.k) + dy });
            pDist = dist; lCenter = { clientX: cClientX, clientY: cClientY };
          }
        };

        const onTe = (e) => {
          if (e.touches.length < 2) { pDist = null; lCenter = null; }
          if (e.touches.length === 0) isDrag = false;
          if (e.touches.length === 1) { 
            isDrag = true; const cur = transformRef.current;
            dStart = { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY, x: cur.x, y: cur.y };
          }
        };

        const onMd = (e) => { isDrag = true; dStart = { clientX: e.clientX, clientY: e.clientY, x: transformRef.current.x, y: transformRef.current.y }; };
        const onMm = (e) => {
          if (!isDrag) return; const { rx, ry } = getRatios();
          const dx = (e.clientX - dStart.clientX) * rx; const dy = (e.clientY - dStart.clientY) * ry;
          updateTransform({ ...transformRef.current, x: dStart.x + dx, y: dStart.y + dy });
        };
        const onMu = () => { isDrag = false; if(rafId) cancelAnimationFrame(rafId); };

        svg.addEventListener('wheel', onWheel, { passive: false });
        svg.addEventListener('touchstart', onTs, { passive: false });
        svg.addEventListener('touchmove', onTm, { passive: false });
        svg.addEventListener('touchend', onTe); svg.addEventListener('touchcancel', onTe);
        svg.addEventListener('mousedown', onMd); window.addEventListener('mousemove', onMm); window.addEventListener('mouseup', onMu);
        return () => {
          svg.removeEventListener('wheel', onWheel); svg.removeEventListener('touchstart', onTs); svg.removeEventListener('touchmove', onTm); svg.removeEventListener('touchcancel', onTe);
          svg.removeEventListener('mousedown', onMd); window.removeEventListener('mousemove', onMm); window.removeEventListener('mouseup', onMu);
          if (rafId) cancelAnimationFrame(rafId);
        };
      }, []); 
    }

    // --- 【子元件：模式一 精準控花】 ---
    function Mode1({ isDark }) {
      const DIRECTIONS = { 'NW_SE': 'A (左上進)', 'SW_NE': 'B (左下進)', 'NE_SW': 'C (右上進)', 'SE_NW': 'D (右下進)' };
      const ANGLES = [{value:0,label:'0°(直)'},{value:45,label:'45°'},{value:90,label:'90°(橫)'},{value:135,label:'135°'},{value:180,label:'180°'},{value:225,label:'225°'},{value:270,label:'270°'},{value:315,label:'315°'}];
      const O_DIRECTIONS = { 'AUTO': '自動判斷', 'CW': '強制順時針', 'CCW': '強制逆時針' };
      const O_ANGLES = [{value:0,label:'0° (不偏移)'},{value:45,label:'+45° 偏移'},{value:90,label:'+90° 偏移'},{value:135,label:'+135° 偏移'},{value:180,label:'+180° 偏移'},{value:225,label:'+225° 偏移'},{value:270,label:'+270° 偏移'},{value:315,label:'+315° 偏移'}];

      const [rawInput, setRawInput] = useStickyState('', 'pikmin_v34_m1_input');
      const [speedKmH, setSpeedKmH] = useStickyState(18, 'pikmin_v34_m1_speed');
      const [patternType, setPatternType] = useStickyState('O', 'pikmin_v34_m1_pattern');
      
      const [points, setPoints] = useState([]);
      // 【V36 更新】狀態新增 pureGpx 與 pureCsv
      const [outputs, setOutputs] = useState({ plantingGpx: '', plantingCsv: '', fruitGpx: '', fruitCsv: '', pureGpx: '', pureCsv: '' });
      const [outputTab, setOutputTab] = useState('planting');
      const [outputFormat, setOutputFormat] = useState('gpx'); 
      const [copied, setCopied] = useState(false);
      const [stats, setStats] = useState({ distKm: 0, timeMin: 0 });
      const [toastMsg, setToastMsg] = useState('');
      const [diagnosticMsg, setDiagnosticMsg] = useState(null);
      const [loading, setLoading] = useState(false);

      const svgRef = useRef(null);
      const [transform, setTransform] = useState({ k: 1, x: 0, y: 0 });
      const transformRef = useRef(transform); transformRef.current = transform;

      const handleParse = useCallback(() => {
        setLoading(true);
        setTimeout(() => {
          try {
              const lines = rawInput.split('\n');
              const newPoints = []; let idCounter = 1;
              const seenCoords = new Set();
              let duplicateCount = 0; let totalCount = 0; let invalidCount = 0;
              
              lines.forEach(line => {
                const match = line.match(/(-?\d+\.\d+)[,\s]+(-?\d+\.\d+)/);
                if (match) {
                  totalCount++;
                  const lat = parseFloat(match[1]); const lon = parseFloat(match[2]);
                  if (isValidCoord(lat, lon)) {
                      const coordKey = `${lat.toFixed(6)},${lon.toFixed(6)}`;
                      if (!seenCoords.has(coordKey)) {
                        seenCoords.add(coordKey);
                        newPoints.push({ id: idCounter++, lat, lon, dir: 'NW_SE', angle: 0 });
                      } else { duplicateCount++; }
                  } else { invalidCount++; }
                }
              });
              setPoints(calcDirs(newPoints)); 
              setOutputs({ plantingGpx: '', plantingCsv: '', fruitGpx: '', fruitCsv: '', pureGpx: '', pureCsv: '' }); 
              resetZoom();
              
              if (totalCount > 0) {
                 let msg = `載入 ${newPoints.length} 個座標！`;
                 if (duplicateCount > 0) msg += ` (過濾 ${duplicateCount} 重複)`;
                 if (invalidCount > 0) msg += ` (忽略 ${invalidCount} 錯誤座標)`;
                 setToastMsg(msg);
                 setTimeout(() => setToastMsg(''), 3500);
              }
          } catch (e) {
              setToastMsg(`解析錯誤：請檢查座標格式！`);
              setTimeout(() => setToastMsg(''), 3000);
          } finally {
              setLoading(false);
          }
        }, 10);
      }, [rawInput]);

      const calcDirs = (pts) => {
        if (!pts.length) return pts;
        return pts.map((pt, i) => {
          let dir = 'NW_SE';
          if (i === 0) {
            if (pts.length > 1) { const dLat = pts[1].lat - pt.lat; const dLon = pts[1].lon - pt.lon; dir = dLon > 0 ? (dLat > 0 ? 'SW_NE' : 'NW_SE') : (dLat > 0 ? 'SE_NW' : 'NE_SW'); } 
            else dir = 'SW_NE';
          } else {
            const prev = pts[i - 1]; const dLat = pt.lat - prev.lat; const dLon = pt.lon - prev.lon;
            dir = dLon > 0 ? (dLat > 0 ? 'SW_NE' : 'NW_SE') : (dLat > 0 ? 'SE_NW' : 'NE_SW');
          }
          return { ...pt, dir };
        });
      };

      const handleOptimize = useCallback(() => {
        if (points.length <= 1) return;
        setLoading(true);
        setTimeout(() => {
          try {
            let unv = [...points]; let cur = unv.shift(); let opt = [cur];
            while (unv.length > 0) {
              let nIdx = 0; let minD = Infinity;
              for (let i = 0; i < unv.length; i++) {
                const dist = calcDistanceKm(cur, unv[i]);
                if (dist < minD) { minD = dist; nIdx = i; }
              }
              cur = unv[nIdx]; opt.push(cur); unv.splice(nIdx, 1);
            }

            let improved = true;
            while (improved) {
              improved = false;
              for (let i = 1; i < opt.length - 2; i++) {
                for (let j = i + 1; j < opt.length - 1; j++) {
                  const d1 = calcDistanceKm(opt[i-1], opt[i]) + calcDistanceKm(opt[j], opt[j+1]);
                  const d2 = calcDistanceKm(opt[i-1], opt[j]) + calcDistanceKm(opt[i], opt[j+1]);
                  if (d2 < d1) {
                    const rev = opt.slice(i, j + 1).reverse();
                    opt.splice(i, j - i + 1, ...rev);
                    improved = true;
                  }
                }
              }
            }
            setPoints(calcDirs(opt));
            setToastMsg('✨ 2-opt 交叉解纏演算法 最佳化完成！');
            setTimeout(() => setToastMsg(''), 3000);
          } catch (e) {
            setToastMsg(`最佳化錯誤：${e.message}`);
            setTimeout(() => setToastMsg(''), 3000);
          } finally {
            setLoading(false);
          }
        }, 10);
      }, [points]);

      const updatePoint = (idx, field, val) => { const n = [...points]; n[idx][field] = val; setPoints(n); };
      const movePoint = (idx, dir) => {
        if ((dir === -1 && idx === 0) || (dir === 1 && idx === points.length - 1)) return;
        const n = [...points]; const tmp = n[idx]; n[idx] = n[idx + dir]; n[idx + dir] = tmp; setPoints(n);
      };
      const deletePoint = (idx) => { const n = [...points]; n.splice(idx, 1); setPoints(n); };

      const getFlwPts = (pt, idx = 0, allPts = [], type = patternType) => {
        const { lat, lon, dir, angle } = pt; 
        let b = [];
        
        if (type === 'O') {
            let outAngle = 0; let inAngle = 0;
            if (allPts.length > 0 && idx < allPts.length - 1) {
                const next = allPts[idx + 1]; const dLon = (next.lon - lon) * Math.PI / 180;
                const lat1 = lat * Math.PI / 180; const lat2 = next.lat * Math.PI / 180;
                outAngle = Math.atan2(Math.sin(dLon) * Math.cos(lat2), Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon));
            } else if (allPts.length > 0 && idx > 0) {
                const prev = allPts[idx - 1]; const dLon = (lon - prev.lon) * Math.PI / 180;
                const lat1 = prev.lat * Math.PI / 180; const lat2 = lat * Math.PI / 180;
                outAngle = Math.atan2(Math.sin(dLon) * Math.cos(lat2), Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon));
            }
            if (allPts.length > 0 && idx > 0) {
                const prev = allPts[idx - 1]; const dLon = (lon - prev.lon) * Math.PI / 180;
                const lat1 = prev.lat * Math.PI / 180; const lat2 = lat * Math.PI / 180;
                inAngle = Math.atan2(Math.sin(dLon) * Math.cos(lat2), Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon));
            } else { inAngle = outAngle; }

            outAngle += (angle * Math.PI) / 180;
            const arrivalAngle = inAngle + Math.PI; 
            
            // 【V36 實戰修正】將 8 邊形暴力升級為 32 邊形平滑真圓
            const POINT_COUNT = 32;
            const ANGLE_STEP = (2 * Math.PI) / POINT_COUNT;
            
            const cwP1 = outAngle - (POINT_COUNT - 1) * ANGLE_STEP;  
            const ccwP1 = outAngle + (POINT_COUNT - 1) * ANGLE_STEP; 
            
            const norm = (a) => { let res = a % (2 * Math.PI); return res < 0 ? res + 2 * Math.PI : res; };
            const angDiff = (a, b) => { let d = Math.abs(norm(a) - norm(b)); return Math.min(d, 2 * Math.PI - d); };
            
            let isCw = true;
            if (dir === 'CW') isCw = true;
            else if (dir === 'CCW') isCw = false;
            else isCw = angDiff(cwP1, arrivalAngle) <= angDiff(ccwP1, arrivalAngle);

            for (let i = 1; i <= POINT_COUNT; i++) {
                const a = isCw ? (outAngle + (i - POINT_COUNT) * ANGLE_STEP) : (outAngle - (i - POINT_COUNT) * ANGLE_STEP);
                b.push({ x: CONSTANTS.FLW_SAFE_RADIUS_M * Math.sin(a), y: CONSTANTS.FLW_SAFE_RADIUS_M * Math.cos(a) }); 
            }
            const mLon = getLonToMeters(lat);
            return b.map(m => { return { l: lat + (m.y / CONSTANTS.LAT_TO_M), n: lon + (m.x / mLon) }; });
        } else {
            let safeDir = ['NW_SE', 'SW_NE', 'NE_SW', 'SE_NW'].includes(dir) ? dir : 'NW_SE';
            const rOffset = CONSTANTS.FLW_SAFE_RADIUS_M;
            if (type === 'S') {
              switch(safeDir) {
                case 'NW_SE': b = [{x:-rOffset,y:rOffset},{x:-rOffset,y:-rOffset},{x:0,y:-rOffset},{x:0,y:rOffset},{x:rOffset,y:rOffset},{x:rOffset,y:-rOffset}]; break;
                case 'SW_NE': b = [{x:-rOffset,y:-rOffset},{x:-rOffset,y:rOffset},{x:0,y:rOffset},{x:0,y:-rOffset},{x:rOffset,y:-rOffset},{x:rOffset,y:rOffset}]; break;
                case 'NE_SW': b = [{x:rOffset,y:rOffset},{x:rOffset,y:-rOffset},{x:0,y:-rOffset},{x:0,y:rOffset},{x:-rOffset,y:rOffset},{x:-rOffset,y:-rOffset}]; break;
                case 'SE_NW': b = [{x:rOffset,y:-rOffset},{x:rOffset,y:rOffset},{x:0,y:rOffset},{x:0,y:-rOffset},{x:-rOffset,y:-rOffset},{x:-rOffset,y:rOffset}]; break;
              }
            } else if (type === 'N') {
              switch(safeDir) {
                case 'NW_SE': b = [{x:-rOffset,y:rOffset},{x:-rOffset,y:-rOffset},{x:rOffset,y:rOffset},{x:rOffset,y:-rOffset}]; break;
                case 'SW_NE': b = [{x:-rOffset,y:-rOffset},{x:-rOffset,y:rOffset},{x:rOffset,y:-rOffset},{x:rOffset,y:rOffset}]; break;
                case 'NE_SW': b = [{x:rOffset,y:rOffset},{x:rOffset,y:-rOffset},{x:-rOffset,y:rOffset},{x:-rOffset,y:-rOffset}]; break;
                case 'SE_NW': b = [{x:rOffset,y:-rOffset},{x:rOffset,y:rOffset},{x:-rOffset,y:-rOffset},{x:rOffset,y:rOffset}]; break;
              }
            }
            const r = (angle * Math.PI) / 180; const c = Math.cos(r); const s = Math.sin(r);
            const mLon = getLonToMeters(lat);
            return b.map(m => { return { l: lat + ((-m.x*s + m.y*c) / CONSTANTS.LAT_TO_M), n: lon + ((m.x*c + m.y*s) / mLon) }; });
        }
      };

      const getFrtPt = (pt, i) => {
        const dist = 18 + ((pt.id * 7) % 8); const rad = (pt.id * 137.5) * (Math.PI / 180);
        return { l: pt.lat + (dist*Math.sin(rad))/CONSTANTS.LAT_TO_M, n: pt.lon + (dist*Math.cos(rad))/(getLonToMeters(pt.lat)) };
      };

      const generate = useCallback(() => {
        if (!points.length) return;
        setLoading(true);
        setTimeout(() => {
          try {
            let pGpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="V36">\n  <trk><name>Planting_${patternType}</name><trkseg>\n`;
            let pCsv = '';
            points.forEach((pt, idx) => {
              const np = `F${String(idx + 1).padStart(2, '0')}`;
              getFlwPts(pt, idx, points).forEach((p, i) => {
                  pGpx += `    <trkpt lat="${p.l.toFixed(6)}" lon="${p.n.toFixed(6)}"><name>${np}_P${i+1}</name></trkpt>\n`;
                  pCsv += `${p.l.toFixed(6)}, ${p.n.toFixed(6)}\n`;
              });
            });
            pGpx += `  </trkseg></trk></gpx>`;

            let fGpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="V36">\n  <trk><name>Fruit</name><trkseg>\n`;
            let fCsv = '';
            points.forEach((pt, idx) => {
              const fp = getFrtPt(pt, idx);
              fGpx += `    <trkpt lat="${fp.l.toFixed(6)}" lon="${fp.n.toFixed(6)}"><name>Fruit_F${idx+1}</name></trkpt>\n`;
              fCsv += `${fp.l.toFixed(6)}, ${fp.n.toFixed(6)}\n`;
            });
            fGpx += `  </trkseg></trk></gpx>`;

            // 【V36 更新】實裝純花點 (直線連線) 生成邏輯
            let puGpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="V36">\n  <trk><name>Pure_Flowers</name><trkseg>\n`;
            let puCsv = '';
            points.forEach((pt, idx) => {
              puGpx += `    <trkpt lat="${pt.lat.toFixed(6)}" lon="${pt.lon.toFixed(6)}"><name>F${idx+1}</name></trkpt>\n`;
              puCsv += `${pt.lat.toFixed(6)}, ${pt.lon.toFixed(6)}\n`;
            });
            puGpx += `  </trkseg></trk></gpx>`;

            setOutputs({ plantingGpx: pGpx, plantingCsv: pCsv, fruitGpx: fGpx, fruitCsv: fCsv, pureGpx: puGpx, pureCsv: puCsv });
          } catch (e) {
            setToastMsg(`生成錯誤：${e.message}`);
            setTimeout(() => setToastMsg(''), 3000);
          } finally {
            setLoading(false);
          }
        }, 10);
      }, [points, patternType]);

      useEffect(() => {
        if (points.length === 0) { setStats({ distKm: 0, timeMin: 0 }); return; }
        try {
          let totalDist = 0;
          for (let i = 0; i < points.length; i++) {
             const curPts = getFlwPts(points[i], i, points);
             for (let j = 0; j < curPts.length - 1; j++) {
                 totalDist += calcDistanceKm({lat: curPts[j].l, lon: curPts[j].n}, {lat: curPts[j+1].l, lon: curPts[j+1].n});
             }
          }
          for (let i = 0; i < points.length - 1; i++) {
               const curPts = getFlwPts(points[i], i, points); const nextPts = getFlwPts(points[i+1], i+1, points);
               const pExit = curPts[curPts.length - 1]; const pEnter = nextPts[0]; 
               totalDist += calcDistanceKm({lat: pExit.l, lon: pExit.n}, {lat: pEnter.l, lon: pEnter.n});
          }
          const tMins = (totalDist / speedKmH) * 60;
          setStats({ distKm: totalDist.toFixed(2), timeMin: Math.round(tMins) });
        } catch(e) {
          console.error("Stats Error:", e);
        }
      }, [points, speedKmH, patternType]);

      const handleDiagnostic = useCallback(() => {
        if (points.length <= 1) { setDiagnosticMsg({ type: 'info', text: '請至少輸入兩個座標才能診斷。' }); return; }
        try {
          let warnings = [];
          for (let i = 0; i < points.length - 1; i++) {
              const curPts = getFlwPts(points[i], i, points); const nextPts = getFlwPts(points[i+1], i+1, points);
              const pExit = curPts[curPts.length - 1]; const pEnter = nextPts[0];
              const distMeters = calcDistanceM({lat: pExit.l, lon: pExit.n}, {lat: pEnter.l, lon: pEnter.n});
              
              if (patternType !== 'O') {
                 const cur = points[i]; 
                 const dirs = ['NW_SE', 'SW_NE', 'NE_SW', 'SE_NW'];
                 let bestDir = cur.dir;
                 let minDist = distMeters;

                 for(const d of dirs) {
                     if (d === cur.dir) continue;
                     const testPts = getFlwPts({...cur, dir: d}, i, points);
                     const testExit = testPts[testPts.length - 1];
                     const testDist = calcDistanceM({lat: testExit.l, lon: testExit.n}, {lat: pEnter.l, lon: pEnter.n});
                     
                     if (testDist < minDist - 15) {
                         minDist = testDist;
                         bestDir = d;
                     }
                 }

                 if (bestDir !== cur.dir) {
                     warnings.push(`點 ${i+1} 往 點 ${i+2} 銜接較遠 (${Math.round(distMeters)}m)，建議點 ${i+1} 改為「${DIRECTIONS[bestDir]}」可縮短至 ${Math.round(minDist)}m！`);
                     break; 
                 }
              }
          }
          if (warnings.length > 0) setDiagnosticMsg({ type: 'warning', text: warnings[0] }); 
          else setDiagnosticMsg({ type: 'success', text: `✨ 路線分析完美，目前無交叉與嚴重空跑！${patternType==='O'?'(O型已自動適應)':''}` });
          setTimeout(() => setDiagnosticMsg(null), 8000); 
        } catch(e) {
          setDiagnosticMsg({ type: 'warning', text: `診斷發生錯誤：${e.message}` });
        }
      }, [points, patternType]);

      const vData = useMemo(() => {
        if (!points.length) return null;
        let ml = Infinity, xl = -Infinity, mn = Infinity, xn = -Infinity;
        const pPaths = points.map((pt, i) => getFlwPts(pt, i, points)); const fPaths = points.map((pt, i) => getFrtPt(pt, i));
        [...pPaths.flat(), ...fPaths].forEach(p => { if(p.l<ml) ml=p.l; if(p.l>xl) xl=p.l; if(p.n<mn) mn=p.n; if(p.n>xn) xn=p.n; });
        
        if (xl === ml) { xl += 0.0005; ml -= 0.0005; }
        if (xn === mn) { xn += 0.0005; mn -= 0.0005; }
        const midLat = (ml + xl) / 2;
        const midLon = (mn + xn) / 2;
        const lonScale = Math.cos(midLat * Math.PI / 180);
        
        const dLat = xl - ml;
        const dLonEquiv = (xn - mn) * lonScale;
        const maxDeg = Math.max(dLat, dLonEquiv) * 1.15; 
        
        const fMinLat = midLat - maxDeg / 2;
        const fMaxLat = midLat + maxDeg / 2;
        const fMinLon = midLon - (maxDeg / lonScale) / 2;
        const fMaxLon = midLon + (maxDeg / lonScale) / 2;

        const toSVG = (lat, lon) => ({ 
            x: ((lon - fMinLon) / (fMaxLon - fMinLon)) * 2000, 
            y: 2000 - (((lat - fMinLat) / (fMaxLat - fMinLat)) * 2000) 
        });
        const c = { lat: midLat, lon: midLon }; 
        const rSafe = Math.abs(toSVG(c.lat, c.lon).y - toSVG(c.lat + CONSTANTS.FLW_SAFE_RADIUS_M/CONSTANTS.LAT_TO_M, c.lon).y);
        const r40 = Math.abs(toSVG(c.lat, c.lon).y - toSVG(c.lat + CONSTANTS.FLW_MAX_RADIUS_M/CONSTANTS.LAT_TO_M, c.lon).y);
        return { toSVG, rSafe, r40, pPaths: pPaths.map(pth => pth.map(p => toSVG(p.l, p.n))), fPaths: fPaths.map(p => toSVG(p.l, p.n)) };
      }, [points, patternType]);

      const resetZoom = () => setTransform({ k: 1, x: 0, y: 0 });
      
      // 【V36 更新】根據選擇的分頁，判定 currentOut
      const currentOut = outputTab === 'pure' ? (outputFormat === 'gpx' ? outputs.pureGpx : outputs.pureCsv) :
                         outputTab === 'planting' ? (outputFormat === 'gpx' ? outputs.plantingGpx : outputs.plantingCsv) : 
                         (outputFormat === 'gpx' ? outputs.fruitGpx : outputs.fruitCsv);

      };

      const dlGPX = () => { 
        if(!currentOut) return;
        const ext = outputFormat === 'gpx' ? 'gpx' : 'txt';
        const mime = outputFormat === 'gpx' ? 'text/xml' : 'text/plain';
        const typeName = patternType === 'S' ? 'S' : patternType === 'N' ? 'N' : 'O';
        // 【V36 更新】檔案名稱邏輯新增 Pure 判斷
        const tabName = outputTab === 'pure' ? 'Pure' : outputTab === 'planting' ? 'Planting' : 'Fruit';
        const ts = getTimestamp();
        const filename = `M1_${typeName}_${tabName}_${points.length}F_${ts}.${ext}`;
        
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(new Blob([currentOut], {type: mime})); 
        a.download = filename; 
        a.click();

      const handleFlowerClick = (index) => {

          {diagnosticMsg && <div className={`absolute top-16 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full z-[1000] flex items-center gap-2 font-bold text-sm shadow-md dark:shadow-xl transition-colors duration-300 ${diagnosticMsg.type === 'warning' ? (isDark ? 'bg-rose-600 text-white' : 'bg-rose-100 text-rose-800 border border-rose-300') : (isDark ? 'bg-emerald-600 text-white' : 'bg-emerald-100 text-emerald-800 border border-emerald-300')}`}><i className={`fas ${diagnosticMsg.type === 'warning' ? 'fa-exclamation-triangle' : 'fa-check-circle'}`}></i>{diagnosticMsg.text}</div>}

                  <button onClick={() => setPatternType('N')} className={`px-2 py-1 text-[9px] font-bold transition-colors ${patternType==='N' ? (isDark ? 'bg-amber-500 text-slate-900' : 'bg-stone-100 text-stone-800 shadow-sm') : (isDark ? 'text-slate-400 hover:text-amber-400' : 'text-stone-500 hover:text-stone-700')}`}>稀有 N型</button>
                  <button onClick={() => setPatternType('O')} className={`px-2 py-1 text-[9px] font-bold transition-colors ${patternType==='O' ? (isDark ? 'bg-purple-500 text-white' : 'bg-stone-100 text-stone-800 shadow-sm') : (isDark ? 'text-slate-400 hover:text-purple-400' : 'text-stone-500 hover:text-stone-700')}`}>圓舞 O型</button>
                </div>

              <textarea className={`w-full h-12 p-2 border rounded font-mono text-[10px] custom-scrollbar focus:outline-none transition-colors duration-300 ${isDark ? `bg-slate-900 border-slate-600 focus:${theme.border} text-slate-200` : `bg-stone-200 border-stone-300 ${theme.ring} text-stone-800 focus:bg-stone-100`}`} value={rawInput} onChange={(e)=>setRawInput(e.target.value)} placeholder="請輸入座標..."></textarea>
              <button onClick={handleParse} disabled={loading} className={`mt-2 w-full text-white py-1.5 rounded font-bold text-xs shadow-sm dark:shadow-lg transition-colors duration-300 disabled:opacity-50 ${theme.bg} ${theme.hoverBg}`}><i className="fas fa-magic"></i> 解析座標</button>

               <div className="flex gap-4">
                 <div className="text-right"><span className="text-[9px] text-stone-500 dark:text-slate-400 block">路程</span><span className={`font-bold text-xs ${isDark ? theme.text : 'text-stone-800'}`}>{stats.distKm} km</span></div>
                 <div className="text-right"><span className="text-[9px] text-stone-500 dark:text-slate-400 block">預估</span><span className={`font-bold text-xs ${isDark ? theme.text : 'text-stone-800'}`}>{stats.timeMin} min</span></div>
               </div>
            </div>

            <div className="flex-1 p-3 sm:p-4 rounded-xl border flex flex-col min-h-0 transition-colors duration-300 bg-stone-100 dark:bg-slate-800 border-stone-300 dark:border-slate-700 shadow-sm dark:shadow-xl">
              <div className="flex justify-between items-center mb-2 pb-2 border-b shrink-0 transition-colors duration-300 border-stone-300 dark:border-slate-700">
                <h2 className={`text-xs sm:text-sm font-bold flex items-center gap-2 ${isDark ? theme.text : 'text-stone-800'}`}><i className="fas fa-sliders-h"></i> 2. 序列微調</h2>
                <div className="flex gap-2">
                    <button onClick={handleDiagnostic} disabled={loading} className="px-2 py-1 rounded text-[10px] font-bold transition active:scale-95 disabled:opacity-50 border bg-stone-200 dark:bg-rose-500/20 text-stone-600 dark:text-rose-400 hover:bg-stone-300 dark:hover:bg-rose-500/40 border-stone-300 dark:border-transparent"><i className="fas fa-brain"></i> 智慧診斷</button>
                    <button onClick={handleOptimize} disabled={loading} className="px-2 py-1 rounded text-[10px] font-bold transition active:scale-95 flex items-center gap-1 disabled:opacity-50 border bg-stone-200 dark:bg-blue-500/20 text-stone-600 dark:text-blue-400 hover:bg-stone-300 dark:hover:bg-blue-500/40 border-stone-300 dark:border-transparent"><i className="fas fa-bolt"></i> TSP排序</button>
                </div>
              </div>
              <div className="flex-1 overflow-y-auto space-y-1.5 custom-scrollbar min-h-0">
                {points.map((pt, i) => {
                  const safeDir = patternType === 'O' ? (['AUTO', 'CW', 'CCW'].includes(pt.dir) ? pt.dir : 'AUTO') : (['NW_SE', 'SW_NE', 'NE_SW', 'SE_NW'].includes(pt.dir) ? pt.dir : 'NW_SE');
                  return (
                    <div key={pt.id} className="px-1.5 py-1 rounded-md text-xs border flex items-center gap-1 transition-all bg-stone-200 dark:bg-slate-700 border-stone-300 dark:border-slate-600 hover:border-emerald-400 dark:hover:border-emerald-400">
                      <span className={`w-4 h-4 rounded-full flex items-center justify-center text-[9px] font-bold shrink-0 ${theme.badgeBg} ${theme.badgeText}`}>{i+1}</span>
                      <select className={`border rounded py-0.5 px-1 text-[10px] flex-[2] min-w-0 truncate focus:outline-none transition-colors duration-300 bg-stone-100 dark:bg-slate-900 border-stone-300 dark:border-transparent text-stone-800 dark:text-slate-200 ${isDark ? theme.ring : 'focus:ring-emerald-500'}`} value={safeDir} onChange={(e)=>updatePoint(i,'dir',e.target.value)}>
                        {patternType==='O'?Object.entries(O_DIRECTIONS).map(([k,v])=><option key={k} value={k} className="bg-stone-100 dark:bg-slate-800 text-stone-800 dark:text-slate-200">{v}</option>):Object.entries(DIRECTIONS).map(([k,v])=><option key={k} value={k} className="bg-stone-100 dark:bg-slate-800 text-stone-800 dark:text-slate-200">{v}</option>)}
                      </select>
                      <select className={`border rounded py-0.5 px-1 text-[10px] flex-1 min-w-0 truncate focus:outline-none transition-colors duration-300 ${isDark ? theme.bgSubtle + ' border-transparent ' + theme.text + ' ' + theme.ring : 'bg-stone-100 border-stone-300 text-stone-800 focus:ring-emerald-500'}`} value={pt.angle||0} onChange={(e)=>updatePoint(i,'angle',parseInt(e.target.value))}>
                        {patternType==='O'?O_ANGLES.map(a=><option key={a.value} value={a.value} className="bg-stone-100 dark:bg-slate-800 text-stone-800 dark:text-white">{a.label}</option>):ANGLES.map(a=><option key={a.value} value={a.value} className="bg-stone-100 dark:bg-slate-800 text-stone-800 dark:text-white">{a.label}</option>)}
                      </select>
                      <div className="flex gap-0.5 shrink-0 bg-stone-100 dark:bg-transparent border border-stone-300 dark:border-transparent rounded transition-colors duration-300">
                        <button onClick={()=>movePoint(i,-1)} disabled={i===0} className="p-1 text-stone-500 hover:text-stone-700 dark:hover:text-emerald-400 disabled:opacity-20"><i className="fas fa-arrow-up text-[10px]"></i></button>
                        <button onClick={()=>movePoint(i,1)} disabled={i===points.length-1} className="p-1 text-stone-500 hover:text-stone-700 dark:hover:text-emerald-400 disabled:opacity-20"><i className="fas fa-arrow-down text-[10px]"></i></button>
                        <button onClick={()=>deletePoint(i)} className="p-1 text-stone-500 hover:text-rose-500 dark:hover:text-red-400"><i className="fas fa-trash text-[10px]"></i></button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="p-3 sm:p-4 rounded-xl border shrink-0 transition-colors duration-300 bg-stone-100 dark:bg-slate-800 border-stone-300 dark:border-slate-700 shadow-sm dark:shadow-xl">
              <button onClick={generate} disabled={loading} className={`w-full font-bold py-1.5 rounded-lg shadow-sm dark:shadow-lg mb-2 active:scale-95 transition text-xs disabled:opacity-50 ${theme.bg} ${isDark ? (patternType==='O'?'text-white':'text-slate-900') : 'text-white ' + theme.hoverBg}`}><i className="fas fa-play"></i> 產生雙路線</button>
              <div className="flex justify-between items-center mb-1.5 gap-2">
                 {/* 【V36 更新】輸出標籤擴充為：純花點 / 種植 / 採果 */}
                 <div className="flex rounded p-1 flex-1 transition-colors duration-300 bg-stone-200 dark:bg-slate-900 border border-stone-300 dark:border-transparent">
                   <button onClick={()=>setOutputTab('pure')} className={`flex-1 text-[10px] py-1 rounded font-bold transition ${outputTab==='pure' ? (isDark ? 'bg-blue-600 text-white' : 'bg-blue-500 text-white shadow-sm') : 'text-stone-500 dark:text-slate-400'}`}>純花點</button>
                   <button onClick={()=>setOutputTab('planting')} className={`flex-1 text-[10px] py-1 rounded font-bold transition ${outputTab==='planting' ? (isDark ? theme.bg + ' ' + (patternType==='O'?'text-white':'text-slate-900') : 'bg-stone-100 text-stone-800 shadow-sm') : 'text-stone-500 dark:text-slate-400'}`}>種植</button>
                   <button onClick={()=>setOutputTab('fruit')} className={`flex-1 text-[10px] py-1 rounded font-bold transition ${outputTab==='fruit' ? (isDark ? 'bg-amber-500 text-slate-900' : 'bg-amber-500 text-white shadow-sm') : 'text-stone-500 dark:text-slate-400'}`}>採果</button>
                 </div>
                 <div className="flex rounded border overflow-hidden shrink-0 transition-colors duration-300 bg-stone-200 dark:bg-slate-900 border-stone-300 dark:border-slate-600 shadow-none dark:shadow-inner">

                    <button onClick={()=>setOutputFormat('csv')} className={`px-2 py-1 text-[9px] transition ${outputFormat==='csv' ? (isDark ? 'bg-slate-600 text-white' : 'bg-stone-500 text-white shadow-sm') : 'text-stone-500 dark:text-slate-400'}`}>座標</button>
                 </div>
              </div>
              <div className="relative h-16 rounded border shadow-inner transition-colors duration-300 bg-stone-200 dark:bg-slate-900 border-stone-300 dark:border-slate-700">
                <textarea className={`w-full h-full bg-transparent text-[9px] p-2 custom-scrollbar outline-none ${theme.outputText}`} readOnly value={currentOut} placeholder="等待生成..."></textarea>
                {currentOut && <div className="absolute bottom-1 right-1 flex gap-1"><button onClick={copyGPX} className="p-1 rounded active:scale-95 transition bg-stone-100 dark:bg-slate-700 border border-stone-300 dark:border-transparent text-stone-600 dark:text-white hover:bg-stone-200 dark:hover:bg-slate-600"><i className={`fas ${copied?`fa-check ${isDark ? theme.text : 'text-emerald-600'}`:`fa-copy ${isDark ? 'text-white' : 'text-stone-600'}`} text-[10px]`}></i></button><button onClick={dlGPX} className={`text-white px-2 rounded text-[10px] font-bold active:scale-95 transition shadow-sm ${theme.bg} ${isDark ? '' : theme.hoverBg}`}><i className="fas fa-download"></i></button></div>}

          <div className="lg:col-span-8 rounded-xl border relative overflow-hidden min-h-[50vh] lg:h-full flex flex-col pb-4 transition-colors duration-300 bg-stone-100 dark:bg-slate-800/50 border-stone-300 dark:border-slate-700 shadow-sm dark:shadow-2xl z-10">
            <div className="absolute top-2 left-2 z-10 flex gap-2 pointer-events-none w-full pr-4">
              <span className={`px-2 py-1.5 rounded text-[10px] border shadow-sm dark:shadow-md pointer-events-auto backdrop-blur flex items-center gap-1 font-bold transition-colors duration-300 bg-stone-100/90 dark:bg-slate-900/90 border-stone-300 dark:border-slate-700 text-stone-800 dark:text-white`}><i className={`fas fa-${patternType==='O'?'sync text-purple-600':patternType==='S'?'leaf text-emerald-600':'bolt text-amber-600'} ${isDark ? theme.icon : ''}`}></i><span className="hidden sm:inline">{patternType==='O'?'圓舞':patternType==='S'?'種花':'稀有'}</span></span>
              <button onClick={resetZoom} className="border px-2 py-1.5 rounded text-[10px] pointer-events-auto ml-auto transition active:scale-95 flex items-center gap-1 shadow-sm font-semibold duration-300 bg-stone-200 dark:bg-slate-700/90 border-stone-300 dark:border-slate-600 hover:bg-stone-300 dark:hover:bg-slate-600 text-stone-700 dark:text-white"><i className="fas fa-crosshairs"></i> 置中</button>
