<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>皮克敏路徑指揮中心</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #0f172a; overscroll-behavior-y: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .svg-container { cursor: grab; touch-action: none; user-select: none; -webkit-user-select: none; }
    .svg-container:active { cursor: grabbing; }
    .bg-grid { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px); }
  </style>
</head>
<body class="bg-grid text-slate-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect, useCallback } = React;

    // --- 【系統常數字典 (Constants)】 ---
    const CONSTANTS = {
      LAT_TO_M: 111132,             // 緯度1度對應的公尺數 (約值)
      FLW_SAFE_RADIUS_M: 30,        // 大花防冷卻極限安全半徑 (公尺)
      FLW_MAX_RADIUS_M: 40,         // 大花最大物理判定半徑 (公尺)
      S2_SPACING_KM: 0.0778,        // 模式二 S2 網格標準列距 (公里)
      MIN_LAT: -90, MAX_LAT: 90,    // 緯度合理範圍
      MIN_LON: -180, MAX_LON: 180   // 經度合理範圍
    };

    // --- 【共用 Helper：防呆座標驗證】 ---
    const isValidCoord = (lat, lon) => {
      return !isNaN(lat) && !isNaN(lon) && lat >= CONSTANTS.MIN_LAT && lat <= CONSTANTS.MAX_LAT && lon >= CONSTANTS.MIN_LON && lon <= CONSTANTS.MAX_LON;
    };

    // --- 【共用 Helper：經緯度距離與轉換】 ---
    const getLonToMeters = (lat) => CONSTANTS.LAT_TO_M * Math.cos((lat * Math.PI) / 180);
    const calcDistanceKm = (p1, p2) => Math.hypot((p1.lat - p2.lat) * (CONSTANTS.LAT_TO_M / 1000), (p1.lon - p2.lon) * (getLonToMeters(p1.lat) / 1000));
    const calcDistanceM = (p1, p2) => Math.hypot((p1.lat - p2.lat) * CONSTANTS.LAT_TO_M, (p1.lon - p2.lon) * getLonToMeters(p1.lat));

    // --- 【共用 Helper：時間戳記產生器】 ---
    const getTimestamp = () => {
      const d = new Date();
      return `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}${String(d.getSeconds()).padStart(2, '0')}`;
    };

    // --- 【共用 Helper：Tailwind 主題顏色映射字典 (修復動態字串 BUG)】 ---
    const getTheme = (type) => {
      const themes = {
        'S': { bg: 'bg-emerald-600', text: 'text-emerald-400', border: 'border-emerald-500', bgSubtle: 'bg-emerald-900/50', ring: 'focus:ring-emerald-500', hexMain: '#10b981', hexLine: '#34d399' },
        'N': { bg: 'bg-amber-600', text: 'text-amber-400', border: 'border-amber-500', bgSubtle: 'bg-amber-900/50', ring: 'focus:ring-amber-500', hexMain: '#f59e0b', hexLine: '#fbbf24' },
        'O': { bg: 'bg-purple-600', text: 'text-purple-400', border: 'border-purple-500', bgSubtle: 'bg-purple-900/50', ring: 'focus:ring-purple-500', hexMain: '#a855f7', hexLine: '#c084fc' }
      };
      return themes[type] || themes['S'];
    };

    // --- 【共用 Hook：LocalStorage 狀態記憶】 ---
    function useStickyState(defaultValue, key) {
      const [value, setValue] = useState(() => {
        const stickyValue = window.localStorage.getItem(key);
        return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
      });
      useEffect(() => { window.localStorage.setItem(key, JSON.stringify(value)); }, [key, value]);
      return [value, setValue];
    }

    // --- 【共用 Hook：精準 1:1 觸控與拖曳引擎 (導入 requestAnimationFrame)】 ---
    function useInteractiveMap(svgRef, transformRef, setTransform) {
      useEffect(() => {
        const svg = svgRef.current; if (!svg) return;
        let isDrag = false; let dStart = { clientX: 0, clientY: 0, x: 0, y: 0 }; let pDist = null; let lCenter = null;
        let rafId = null; // 用於儲存 requestAnimationFrame ID
        const getRatios = () => { const rect = svg.getBoundingClientRect(); return { rx: 2000 / rect.width, ry: 2000 / rect.height, rect }; };

        const updateTransform = (newTransform) => {
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(() => setTransform(newTransform));
        };

        const onWheel = (e) => {
          e.preventDefault(); const cur = transformRef.current;
          let nk = e.deltaY < 0 ? cur.k * 1.1 : cur.k / 1.1;
          if (nk < 0.01) nk = 0.01; if (nk > 50) nk = 50;
          const { rx, ry, rect } = getRatios();
          const mx = (e.clientX - rect.left) * rx; const my = (e.clientY - rect.top) * ry;
          updateTransform({ k: nk, x: mx - (mx - cur.x)*(nk/cur.k), y: my - (my - cur.y)*(nk/cur.k) });
        };

        const onTs = (e) => {
          if (e.touches.length === 1) {
            isDrag = true; const cur = transformRef.current;
            dStart = { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY, x: cur.x, y: cur.y };
          } else if (e.touches.length === 2) {
            isDrag = false; const t1 = e.touches[0]; const t2 = e.touches[1];
            pDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            lCenter = { clientX: (t1.clientX + t2.clientX) / 2, clientY: (t1.clientY + t2.clientY) / 2 };
          }
        };

        const onTm = (e) => {
          e.preventDefault(); const cur = transformRef.current; const { rx, ry, rect } = getRatios();
          if (e.touches.length === 1 && isDrag) {
            const dx = (e.touches[0].clientX - dStart.clientX) * rx; const dy = (e.touches[0].clientY - dStart.clientY) * ry;
            updateTransform({ ...cur, x: dStart.x + dx, y: dStart.y + dy });
          } else if (e.touches.length === 2 && pDist && lCenter) {
            const t1 = e.touches[0]; const t2 = e.touches[1];
            const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            const cClientX = (t1.clientX + t2.clientX) / 2; const cClientY = (t1.clientY + t2.clientY) / 2;
            let nk = cur.k * (dist / pDist); if (nk < 0.01) nk = 0.01; if (nk > 50) nk = 50;
            const mx = (cClientX - rect.left) * rx; const my = (cClientY - rect.top) * ry;
            const dx = (cClientX - lCenter.clientX) * rx; const dy = (cClientY - lCenter.clientY) * ry;
            updateTransform({ k: nk, x: mx - (mx - cur.x)*(nk/cur.k) + dx, y: my - (my - cur.y)*(nk/cur.k) + dy });
            pDist = dist; lCenter = { clientX: cClientX, clientY: cClientY };
          }
        };

        const onTe = (e) => {
          if (e.touches.length < 2) { pDist = null; lCenter = null; }
          if (e.touches.length === 0) isDrag = false;
          if (e.touches.length === 1) { 
            isDrag = true; const cur = transformRef.current;
            dStart = { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY, x: cur.x, y: cur.y };
          }
        };

        const onMd = (e) => { isDrag = true; dStart = { clientX: e.clientX, clientY: e.clientY, x: transformRef.current.x, y: transformRef.current.y }; };
        const onMm = (e) => {
          if (!isDrag) return; const { rx, ry } = getRatios();
          const dx = (e.clientX - dStart.clientX) * rx; const dy = (e.clientY - dStart.clientY) * ry;
          updateTransform({ ...transformRef.current, x: dStart.x + dx, y: dStart.y + dy });
        };
        const onMu = () => { isDrag = false; if(rafId) cancelAnimationFrame(rafId); };

        svg.addEventListener('wheel', onWheel, { passive: false });
        svg.addEventListener('touchstart', onTs, { passive: false });
        svg.addEventListener('touchmove', onTm, { passive: false });
        svg.addEventListener('touchend', onTe); svg.addEventListener('touchcancel', onTe);
        svg.addEventListener('mousedown', onMd); window.addEventListener('mousemove', onMm); window.addEventListener('mouseup', onMu);
        return () => {
          svg.removeEventListener('wheel', onWheel); svg.removeEventListener('touchstart', onTs); svg.removeEventListener('touchmove', onTm); svg.removeEventListener('touchend', onTe); svg.removeEventListener('touchcancel', onTe);
          svg.removeEventListener('mousedown', onMd); window.removeEventListener('mousemove', onMm); window.removeEventListener('mouseup', onMu);
          if (rafId) cancelAnimationFrame(rafId);
        };
      }, []); 
    }

    // --- 【子元件：模式一 精準控花】 ---
    function Mode1() {
      const DIRECTIONS = { 'NW_SE': 'A (左上進)', 'SW_NE': 'B (左下進)', 'NE_SW': 'C (右上進)', 'SE_NW': 'D (右下進)' };
      const ANGLES = [{value:0,label:'0°(直)'},{value:45,label:'45°'},{value:90,label:'90°(橫)'},{value:135,label:'135°'},{value:180,label:'180°'},{value:225,label:'225°'},{value:270,label:'270°'},{value:315,label:'315°'}];
      const O_DIRECTIONS = { 'AUTO': '自動判斷', 'CW': '強制順時針', 'CCW': '強制逆時針' };
      const O_ANGLES = [{value:0,label:'0° (不偏移)'},{value:45,label:'+45° 偏移'},{value:90,label:'+90° 偏移'},{value:135,label:'+135° 偏移'},{value:180,label:'+180° 偏移'},{value:225,label:'+225° 偏移'},{value:270,label:'+270° 偏移'},{value:315,label:'+315° 偏移'}];

      // 導入 LocalStorage 狀態記憶
      const [rawInput, setRawInput] = useStickyState('', 'pikmin_v32_m1_input');
      const [speedKmH, setSpeedKmH] = useStickyState(18, 'pikmin_v32_m1_speed');
      const [patternType, setPatternType] = useStickyState('O', 'pikmin_v32_m1_pattern');
      
      const [points, setPoints] = useState([]);
      const [outputs, setOutputs] = useState({ plantingGpx: '', plantingCsv: '', fruitGpx: '', fruitCsv: '' });
      const [outputTab, setOutputTab] = useState('planting');
      const [outputFormat, setOutputFormat] = useState('gpx'); 
      const [copied, setCopied] = useState(false);
      const [stats, setStats] = useState({ distKm: 0, timeMin: 0 });
      const [toastMsg, setToastMsg] = useState('');
      const [diagnosticMsg, setDiagnosticMsg] = useState(null);
      const [loading, setLoading] = useState(false);

      const svgRef = useRef(null);
      const [transform, setTransform] = useState({ k: 1, x: 0, y: 0 });
      const transformRef = useRef(transform); transformRef.current = transform;

      const handleParse = useCallback(() => {
        setLoading(true);
        setTimeout(() => {
          try {
              const lines = rawInput.split('\n');
              const newPoints = []; let idCounter = 1;
              const seenCoords = new Set();
              let duplicateCount = 0; let totalCount = 0; let invalidCount = 0;
              
              lines.forEach(line => {
                const match = line.match(/(-?\d+\.\d+)[,\s]+(-?\d+\.\d+)/);
                if (match) {
                  totalCount++;
                  const lat = parseFloat(match[1]); const lon = parseFloat(match[2]);
                  if (isValidCoord(lat, lon)) {
                      const coordKey = `${lat.toFixed(6)},${lon.toFixed(6)}`;
                      if (!seenCoords.has(coordKey)) {
                        seenCoords.add(coordKey);
                        newPoints.push({ id: idCounter++, lat, lon, dir: 'NW_SE', angle: 0 });
                      } else { duplicateCount++; }
                  } else { invalidCount++; }
                }
              });
              setPoints(calcDirs(newPoints)); 
              setOutputs({ plantingGpx: '', plantingCsv: '', fruitGpx: '', fruitCsv: '' }); 
              resetZoom();
              
              if (totalCount > 0) {
                 let msg = `載入 ${newPoints.length} 個座標！`;
                 if (duplicateCount > 0) msg += ` (過濾 ${duplicateCount} 重複)`;
                 if (invalidCount > 0) msg += ` (忽略 ${invalidCount} 錯誤座標)`;
                 setToastMsg(msg);
                 setTimeout(() => setToastMsg(''), 3500);
              }
          } catch (e) {
              setToastMsg(`解析錯誤：請檢查座標格式！`);
              setTimeout(() => setToastMsg(''), 3000);
          } finally {
              setLoading(false);
          }
        }, 10);
      }, [rawInput]);

      const calcDirs = (pts) => {
        if (!pts.length) return pts;
        return pts.map((pt, i) => {
          let dir = 'NW_SE';
          if (i === 0) {
            if (pts.length > 1) { const dLat = pts[1].lat - pt.lat; const dLon = pts[1].lon - pt.lon; dir = dLon > 0 ? (dLat > 0 ? 'SW_NE' : 'NW_SE') : (dLat > 0 ? 'SE_NW' : 'NE_SW'); } 
            else dir = 'SW_NE';
          } else {
            const prev = pts[i - 1]; const dLat = pt.lat - prev.lat; const dLon = pt.lon - prev.lon;
            dir = dLon > 0 ? (dLat > 0 ? 'SW_NE' : 'NW_SE') : (dLat > 0 ? 'SE_NW' : 'NE_SW');
          }
          return { ...pt, dir };
        });
      };

      const handleOptimize = useCallback(() => {
        if (points.length <= 1) return;
        setLoading(true);
        setTimeout(() => {
          try {
            let unv = [...points]; let cur = unv.shift(); let opt = [cur];
            while (unv.length > 0) {
              let nIdx = 0; let minD = Infinity;
              for (let i = 0; i < unv.length; i++) {
                const dist = calcDistanceKm(cur, unv[i]);
                if (dist < minD) { minD = dist; nIdx = i; }
              }
              cur = unv[nIdx]; opt.push(cur); unv.splice(nIdx, 1);
            }

            let improved = true;
            while (improved) {
              improved = false;
              for (let i = 1; i < opt.length - 2; i++) {
                for (let j = i + 1; j < opt.length - 1; j++) {
                  const d1 = calcDistanceKm(opt[i-1], opt[i]) + calcDistanceKm(opt[j], opt[j+1]);
                  const d2 = calcDistanceKm(opt[i-1], opt[j]) + calcDistanceKm(opt[i], opt[j+1]);
                  if (d2 < d1) {
                    const rev = opt.slice(i, j + 1).reverse();
                    opt.splice(i, j - i + 1, ...rev);
                    improved = true;
                  }
                }
              }
            }
            setPoints(calcDirs(opt));
            setToastMsg('✨ 2-opt 交叉解纏演算法 最佳化完成！');
            setTimeout(() => setToastMsg(''), 3000);
          } catch (e) {
            setToastMsg(`最佳化錯誤：${e.message}`);
            setTimeout(() => setToastMsg(''), 3000);
          } finally {
            setLoading(false);
          }
        }, 10);
      }, [points]);

      const updatePoint = (idx, field, val) => { const n = [...points]; n[idx][field] = val; setPoints(n); };
      const movePoint = (idx, dir) => {
        if ((dir === -1 && idx === 0) || (dir === 1 && idx === points.length - 1)) return;
        const n = [...points]; const tmp = n[idx]; n[idx] = n[idx + dir]; n[idx + dir] = tmp; setPoints(n);
      };
      const deletePoint = (idx) => { const n = [...points]; n.splice(idx, 1); setPoints(n); };

      const getFlwPts = (pt, idx = 0, allPts = [], type = patternType) => {
        const { lat, lon, dir, angle } = pt; 
        let b = [];
        
        if (type === 'O') {
            let outAngle = 0; let inAngle = 0;
            if (allPts.length > 0 && idx < allPts.length - 1) {
                const next = allPts[idx + 1]; const dLon = (next.lon - lon) * Math.PI / 180;
                const lat1 = lat * Math.PI / 180; const lat2 = next.lat * Math.PI / 180;
                outAngle = Math.atan2(Math.sin(dLon) * Math.cos(lat2), Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon));
            } else if (allPts.length > 0 && idx > 0) {
                const prev = allPts[idx - 1]; const dLon = (lon - prev.lon) * Math.PI / 180;
                const lat1 = prev.lat * Math.PI / 180; const lat2 = lat * Math.PI / 180;
                outAngle = Math.atan2(Math.sin(dLon) * Math.cos(lat2), Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon));
            }
            if (allPts.length > 0 && idx > 0) {
                const prev = allPts[idx - 1]; const dLon = (lon - prev.lon) * Math.PI / 180;
                const lat1 = prev.lat * Math.PI / 180; const lat2 = lat * Math.PI / 180;
                inAngle = Math.atan2(Math.sin(dLon) * Math.cos(lat2), Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon));
            } else { inAngle = outAngle; }

            outAngle += (angle * Math.PI) / 180;
            const arrivalAngle = inAngle + Math.PI; 
            const cwP1 = outAngle - 7 * (Math.PI / 4);  
            const ccwP1 = outAngle + 7 * (Math.PI / 4); 
            
            const norm = (a) => { let res = a % (2 * Math.PI); return res < 0 ? res + 2 * Math.PI : res; };
            const angDiff = (a, b) => { let d = Math.abs(norm(a) - norm(b)); return Math.min(d, 2 * Math.PI - d); };
            
            let isCw = true;
            if (dir === 'CW') isCw = true;
            else if (dir === 'CCW') isCw = false;
            else isCw = angDiff(cwP1, arrivalAngle) <= angDiff(ccwP1, arrivalAngle);

            for (let i = 1; i <= 8; i++) {
                const a = isCw ? (outAngle + (i - 8) * (Math.PI / 4)) : (outAngle - (i - 8) * (Math.PI / 4));
                b.push({ x: CONSTANTS.FLW_SAFE_RADIUS_M * Math.sin(a), y: CONSTANTS.FLW_SAFE_RADIUS_M * Math.cos(a) }); 
            }
            const mLon = getLonToMeters(lat);
            return b.map(m => { return { l: lat + (m.y / CONSTANTS.LAT_TO_M), n: lon + (m.x / mLon) }; });
        } else {
            let safeDir = ['NW_SE', 'SW_NE', 'NE_SW', 'SE_NW'].includes(dir) ? dir : 'NW_SE';
            const rOffset = CONSTANTS.FLW_SAFE_RADIUS_M;
            if (type === 'S') {
              switch(safeDir) {
                case 'NW_SE': b = [{x:-rOffset,y:rOffset},{x:-rOffset,y:-rOffset},{x:0,y:-rOffset},{x:0,y:rOffset},{x:rOffset,y:rOffset},{x:rOffset,y:-rOffset}]; break;
                case 'SW_NE': b = [{x:-rOffset,y:-rOffset},{x:-rOffset,y:rOffset},{x:0,y:rOffset},{x:0,y:-rOffset},{x:rOffset,y:-rOffset},{x:rOffset,y:rOffset}]; break;
                case 'NE_SW': b = [{x:rOffset,y:rOffset},{x:rOffset,y:-rOffset},{x:0,y:-rOffset},{x:0,y:rOffset},{x:-rOffset,y:rOffset},{x:-rOffset,y:-rOffset}]; break;
                case 'SE_NW': b = [{x:rOffset,y:-rOffset},{x:rOffset,y:rOffset},{x:0,y:rOffset},{x:0,y:-rOffset},{x:-rOffset,y:-rOffset},{x:-rOffset,y:rOffset}]; break;
              }
            } else if (type === 'N') {
              switch(safeDir) {
                case 'NW_SE': b = [{x:-rOffset,y:rOffset},{x:-rOffset,y:-rOffset},{x:rOffset,y:rOffset},{x:rOffset,y:-rOffset}]; break;
                case 'SW_NE': b = [{x:-rOffset,y:-rOffset},{x:-rOffset,y:rOffset},{x:rOffset,y:-rOffset},{x:rOffset,y:rOffset}]; break;
                case 'NE_SW': b = [{x:rOffset,y:rOffset},{x:rOffset,y:-rOffset},{x:-rOffset,y:rOffset},{x:-rOffset,y:-rOffset}]; break;
                case 'SE_NW': b = [{x:rOffset,y:-rOffset},{x:rOffset,y:rOffset},{x:-rOffset,y:-rOffset},{x:-rOffset,y:rOffset}]; break;
              }
            }
            const r = (angle * Math.PI) / 180; const c = Math.cos(r); const s = Math.sin(r);
            const mLon = getLonToMeters(lat);
            return b.map(m => { return { l: lat + ((-m.x*s + m.y*c) / CONSTANTS.LAT_TO_M), n: lon + ((m.x*c + m.y*s) / mLon) }; });
        }
      };

      const getFrtPt = (pt, i) => {
        const dist = 18 + ((pt.id * 7) % 8); const rad = (pt.id * 137.5) * (Math.PI / 180);
        return { l: pt.lat + (dist*Math.sin(rad))/CONSTANTS.LAT_TO_M, n: pt.lon + (dist*Math.cos(rad))/(getLonToMeters(pt.lat)) };
      };

      const generate = useCallback(() => {
        if (!points.length) return;
        setLoading(true);
        setTimeout(() => {
          try {
            let pGpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="V32">\n  <trk><name>Planting_${patternType}</name><trkseg>\n`;
            let pCsv = '';
            points.forEach((pt, idx) => {
              const np = `F${String(idx + 1).padStart(2, '0')}`;
              getFlwPts(pt, idx, points).forEach((p, i) => {
                  pGpx += `    <trkpt lat="${p.l.toFixed(6)}" lon="${p.n.toFixed(6)}"><name>${np}_P${i+1}</name></trkpt>\n`;
                  pCsv += `${p.l.toFixed(6)}, ${p.n.toFixed(6)}\n`;
              });
            });
            pGpx += `  </trkseg></trk></gpx>`;

            let fGpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="V32">\n  <trk><name>Fruit</name><trkseg>\n`;
            let fCsv = '';
            points.forEach((pt, idx) => {
              const fp = getFrtPt(pt, idx);
              fGpx += `    <trkpt lat="${fp.l.toFixed(6)}" lon="${fp.n.toFixed(6)}"><name>Fruit_F${idx+1}</name></trkpt>\n`;
              fCsv += `${fp.l.toFixed(6)}, ${fp.n.toFixed(6)}\n`;
            });
            fGpx += `  </trkseg></trk></gpx>`;

            setOutputs({ plantingGpx: pGpx, plantingCsv: pCsv, fruitGpx: fGpx, fruitCsv: fCsv });
          } catch (e) {
            setToastMsg(`生成錯誤：${e.message}`);
            setTimeout(() => setToastMsg(''), 3000);
          } finally {
            setLoading(false);
          }
        }, 10);
      }, [points, patternType]);

      useEffect(() => {
        if (points.length === 0) { setStats({ distKm: 0, timeMin: 0 }); return; }
        try {
          let totalDist = 0;
          for (let i = 0; i < points.length; i++) {
             const curPts = getFlwPts(points[i], i, points);
             for (let j = 0; j < curPts.length - 1; j++) {
                 totalDist += calcDistanceKm({lat: curPts[j].l, lon: curPts[j].n}, {lat: curPts[j+1].l, lon: curPts[j+1].n});
             }
          }
          for (let i = 0; i < points.length - 1; i++) {
               const curPts = getFlwPts(points[i], i, points); const nextPts = getFlwPts(points[i+1], i+1, points);
               const pExit = curPts[curPts.length - 1]; const pEnter = nextPts[0]; 
               totalDist += calcDistanceKm({lat: pExit.l, lon: pExit.n}, {lat: pEnter.l, lon: pEnter.n});
          }
          const tMins = (totalDist / speedKmH) * 60;
          setStats({ distKm: totalDist.toFixed(2), timeMin: Math.round(tMins) });
        } catch(e) {
          console.error("Stats Error:", e);
        }
      }, [points, speedKmH, patternType]);

      const handleDiagnostic = useCallback(() => {
        if (points.length <= 1) { setDiagnosticMsg({ type: 'info', text: '請至少輸入兩個座標才能診斷。' }); return; }
        try {
          let warnings = [];
          for (let i = 0; i < points.length - 1; i++) {
              const curPts = getFlwPts(points[i], i, points); const nextPts = getFlwPts(points[i+1], i+1, points);
              const pExit = curPts[curPts.length - 1]; const pEnter = nextPts[0];
              const distMeters = calcDistanceM({lat: pExit.l, lon: pExit.n}, {lat: pEnter.l, lon: pEnter.n});
              
              if (patternType !== 'O') {
                 const cur = points[i]; 
                 const dirs = ['NW_SE', 'SW_NE', 'NE_SW', 'SE_NW'];
                 let bestDir = cur.dir;
                 let minDist = distMeters;

                 for(const d of dirs) {
                     if (d === cur.dir) continue;
                     const testPts = getFlwPts({...cur, dir: d}, i, points);
                     const testExit = testPts[testPts.length - 1];
                     const testDist = calcDistanceM({lat: testExit.l, lon: testExit.n}, {lat: pEnter.l, lon: pEnter.n});
                     
                     if (testDist < minDist - 15) {
                         minDist = testDist;
                         bestDir = d;
                     }
                 }

                 if (bestDir !== cur.dir) {
                     warnings.push(`點 ${i+1} 往 點 ${i+2} 銜接較遠 (${Math.round(distMeters)}m)，建議點 ${i+1} 改為「${DIRECTIONS[bestDir]}」可縮短至 ${Math.round(minDist)}m！`);
                     break; 
                 }
              }
          }
          if (warnings.length > 0) setDiagnosticMsg({ type: 'warning', text: warnings[0] }); 
          else setDiagnosticMsg({ type: 'success', text: `✨ 路線分析完美，目前無交叉與嚴重空跑！${patternType==='O'?'(O型已自動適應)':''}` });
          setTimeout(() => setDiagnosticMsg(null), 8000); 
        } catch(e) {
          setDiagnosticMsg({ type: 'warning', text: `診斷發生錯誤：${e.message}` });
        }
      }, [points, patternType]);

      const vData = useMemo(() => {
        if (!points.length) return null;
        let ml = Infinity, xl = -Infinity, mn = Infinity, xn = -Infinity;
        const pPaths = points.map((pt, i) => getFlwPts(pt, i, points)); const fPaths = points.map((pt, i) => getFrtPt(pt, i));
        [...pPaths.flat(), ...fPaths].forEach(p => { if(p.l<ml) ml=p.l; if(p.l>xl) xl=p.l; if(p.n<mn) mn=p.n; if(p.n>xn) xn=p.n; });
        
        if (xl === ml) { xl += 0.0005; ml -= 0.0005; }
        if (xn === mn) { xn += 0.0005; mn -= 0.0005; }
        const midLat = (ml + xl) / 2;
        const midLon = (mn + xn) / 2;
        const lonScale = Math.cos(midLat * Math.PI / 180);
        
        const dLat = xl - ml;
        const dLonEquiv = (xn - mn) * lonScale;
        const maxDeg = Math.max(dLat, dLonEquiv) * 1.15; 
        
        const fMinLat = midLat - maxDeg / 2;
        const fMaxLat = midLat + maxDeg / 2;
        const fMinLon = midLon - (maxDeg / lonScale) / 2;
        const fMaxLon = midLon + (maxDeg / lonScale) / 2;

        const toSVG = (lat, lon) => ({ 
            x: ((lon - fMinLon) / (fMaxLon - fMinLon)) * 2000, 
            y: 2000 - (((lat - fMinLat) / (fMaxLat - fMinLat)) * 2000) 
        });
        const c = { lat: midLat, lon: midLon }; 
        const r30 = Math.abs(toSVG(c.lat, c.lon).y - toSVG(c.lat + CONSTANTS.FLW_SAFE_RADIUS_M/CONSTANTS.LAT_TO_M, c.lon).y);
        const r40 = Math.abs(toSVG(c.lat, c.lon).y - toSVG(c.lat + CONSTANTS.FLW_MAX_RADIUS_M/CONSTANTS.LAT_TO_M, c.lon).y);
        return { toSVG, r30, r40, pPaths: pPaths.map(pth => pth.map(p => toSVG(p.l, p.n))), fPaths: fPaths.map(p => toSVG(p.l, p.n)) };
      }, [points, patternType]);

      useInteractiveMap(svgRef, transformRef, setTransform);
      const resetZoom = () => setTransform({ k: 1, x: 0, y: 0 });
      const currentOut = outputTab === 'planting' ? (outputFormat === 'gpx' ? outputs.plantingGpx : outputs.plantingCsv) : (outputFormat === 'gpx' ? outputs.fruitGpx : outputs.fruitCsv);
      
      const copyGPX = () => { 
        if(!currentOut) return;
        const ta = document.createElement('textarea'); ta.value = currentOut; ta.style.position = 'fixed'; 
        document.body.appendChild(ta); ta.select(); 
        try { document.execCommand('copy'); setCopied(true); setTimeout(()=>setCopied(false), 2000); } 
        catch(err) { console.error("複製失敗", err); } 
        finally { document.body.removeChild(ta); }
      };

      const dlGPX = () => { 
        if(!currentOut) return;
        const ext = outputFormat === 'gpx' ? 'gpx' : 'txt';
        const mime = outputFormat === 'gpx' ? 'text/xml' : 'text/plain';
        const typeName = patternType === 'S' ? 'S' : patternType === 'N' ? 'N' : 'O';
        const tabName = outputTab === 'planting' ? 'Planting' : 'Fruit';
        const ts = getTimestamp();
        const filename = `M1_${typeName}_${tabName}_${points.length}F_${ts}.${ext}`;
        
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(new Blob([currentOut], {type: mime})); 
        a.download = filename; 
        a.click(); 
      };

      const handleFlowerClick = (index) => {
         const newPts = [...points];
         newPts[index].angle = (newPts[index].angle + 45) % 360;
         setPoints(newPts);
      };

      const theme = getTheme(patternType);

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-5 flex-1 min-h-0 relative pb-4">
          {loading && (
            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 rounded-xl">
              <i className={`fas fa-spinner fa-spin text-3xl ${theme.text}`}></i>
              <span className={`ml-3 ${theme.text} font-bold tracking-widest`}>AI 運算中...</span>
            </div>
          )}
          {toastMsg && <div className={`absolute top-4 left-1/2 transform -translate-x-1/2 ${theme.bg} text-white px-6 py-3 rounded-full shadow-lg z-50 animate-bounce flex items-center gap-2 font-bold text-sm`}><i className="fas fa-info-circle"></i>{toastMsg}</div>}
          {diagnosticMsg && <div className={`absolute top-16 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-2 font-bold text-sm ${diagnosticMsg.type === 'warning' ? 'bg-rose-600 text-white' : 'bg-emerald-600 text-white'}`}><i className={`fas ${diagnosticMsg.type === 'warning' ? 'fa-exclamation-triangle' : 'fa-check-circle'}`}></i>{diagnosticMsg.text}</div>}

          <div className="lg:col-span-4 flex flex-col gap-3 h-[550px] sm:h-[600px] lg:h-full min-h-0">
            <div className="bg-slate-800 p-3 sm:p-4 rounded-xl border border-slate-700 shadow-xl shrink-0">
              <div className="flex justify-between items-center mb-2">
                <h2 className={`text-xs sm:text-sm font-bold ${theme.text} flex items-center gap-2`}><i className="fas fa-list-ol"></i> 1. 貼上座標</h2>
                <div className="flex bg-slate-900 rounded border border-slate-600 overflow-hidden">
                  <button onClick={() => setPatternType('S')} className={`px-2 py-1 text-[9px] font-bold transition ${patternType==='S'?'bg-emerald-500 text-slate-900':'text-slate-400 hover:text-emerald-300'}`}>常規 S型</button>
                  <button onClick={() => setPatternType('N')} className={`px-2 py-1 text-[9px] font-bold transition ${patternType==='N'?'bg-amber-500 text-slate-900':'text-slate-400 hover:text-amber-300'}`}>稀有 N型</button>
                  <button onClick={() => setPatternType('O')} className={`px-2 py-1 text-[9px] font-bold transition ${patternType==='O'?'bg-purple-500 text-white':'text-slate-400 hover:text-purple-300'}`}>圓舞 O型</button>
                </div>
              </div>
              <textarea className={`w-full h-12 p-2 bg-slate-900 border border-slate-600 rounded ${theme.border} font-mono text-[10px] text-slate-200 custom-scrollbar`} value={rawInput} onChange={(e)=>setRawInput(e.target.value)} placeholder="請輸入座標..."></textarea>
              <button onClick={handleParse} disabled={loading} className={`mt-2 w-full ${theme.bg} text-white py-1.5 rounded font-bold text-xs shadow-lg transition hover:brightness-110 disabled:opacity-50`}><i className="fas fa-magic"></i> 解析座標</button>
            </div>
            
            <div className="bg-slate-800 p-2 sm:p-3 rounded-xl border border-slate-700 shadow-md flex items-center justify-between shrink-0">
               <div className="flex items-center gap-2"><i className="fas fa-tachometer-alt text-blue-400 text-sm"></i><input type="number" className="w-10 bg-slate-900 border border-slate-600 rounded text-center text-xs text-white outline-none" value={speedKmH} onChange={(e)=>setSpeedKmH(parseFloat(e.target.value)||1)} /><span className="text-[9px] text-slate-500">km/h</span></div>
               <div className="flex gap-4">
                 <div className="text-right"><span className="text-[9px] text-slate-400 block">路程</span><span className={`${theme.text} font-bold text-xs`}>{stats.distKm} km</span></div>
                 <div className="text-right"><span className="text-[9px] text-slate-400 block">預估</span><span className={`${theme.text} font-bold text-xs`}>{stats.timeMin} min</span></div>
               </div>
            </div>

            <div className="flex-1 bg-slate-800 p-3 sm:p-4 rounded-xl border border-slate-700 shadow-xl flex flex-col min-h-0">
              <div className="flex justify-between items-center mb-2 pb-2 border-b border-slate-700 shrink-0">
                <h2 className={`text-xs sm:text-sm font-bold ${theme.text} flex items-center gap-2`}><i className="fas fa-sliders-h"></i> 2. 序列微調</h2>
                <div className="flex gap-2">
                    <button onClick={handleDiagnostic} disabled={loading} className="bg-rose-500/20 text-rose-400 hover:bg-rose-500/40 px-2 py-1 rounded text-[10px] font-bold transition active:scale-95 disabled:opacity-50"><i className="fas fa-brain"></i> 智慧診斷</button>
                    <button onClick={handleOptimize} disabled={loading} className="bg-blue-500/20 text-blue-400 hover:bg-blue-500/40 px-2 py-1 rounded text-[10px] font-bold transition active:scale-95 flex items-center gap-1 disabled:opacity-50"><i className="fas fa-bolt"></i> TSP排序</button>
                </div>
              </div>
              <div className="flex-1 overflow-y-auto space-y-1.5 custom-scrollbar min-h-0">
                {points.map((pt, i) => {
                  const safeDir = patternType === 'O' ? (['AUTO', 'CW', 'CCW'].includes(pt.dir) ? pt.dir : 'AUTO') : (['NW_SE', 'SW_NE', 'NE_SW', 'SE_NW'].includes(pt.dir) ? pt.dir : 'NW_SE');
                  return (
                    <div key={pt.id} className="bg-slate-700 px-1.5 py-1 rounded-md text-xs border border-slate-600 flex items-center gap-1 transition-all">
                      <span className={`text-white w-4 h-4 rounded-full flex items-center justify-center text-[9px] font-bold shrink-0 ${theme.bg}`}>{i+1}</span>
                      <select className={`bg-slate-900 border-none rounded py-0.5 px-1 text-[10px] text-slate-200 flex-[2] min-w-0 truncate ${theme.ring}`} value={safeDir} onChange={(e)=>updatePoint(i,'dir',e.target.value)}>
                        {patternType==='O'?Object.entries(O_DIRECTIONS).map(([k,v])=><option key={k} value={k} className="bg-slate-800 text-slate-200">{v}</option>):Object.entries(DIRECTIONS).map(([k,v])=><option key={k} value={k} className="bg-slate-800 text-slate-200">{v}</option>)}
                      </select>
                      <select className={`bg-slate-900 border border-slate-600 rounded py-0.5 px-1 text-[10px] ${theme.text} flex-1 min-w-0 truncate ${theme.ring}`} value={pt.angle||0} onChange={(e)=>updatePoint(i,'angle',parseInt(e.target.value))}>
                        {patternType==='O'?O_ANGLES.map(a=><option key={a.value} value={a.value} className="bg-slate-800 text-white">{a.label}</option>):ANGLES.map(a=><option key={a.value} value={a.value} className="bg-slate-800 text-white">{a.label}</option>)}
                      </select>
                      <div className="flex gap-0.5 shrink-0">
                        <button onClick={()=>movePoint(i,-1)} disabled={i===0} className="text-slate-400 disabled:opacity-20"><i className="fas fa-arrow-up text-[10px]"></i></button>
                        <button onClick={()=>movePoint(i,1)} disabled={i===points.length-1} className="text-slate-400 disabled:opacity-20"><i className="fas fa-arrow-down text-[10px]"></i></button>
                        <button onClick={()=>deletePoint(i)} className="text-red-400 hover:text-red-300"><i className="fas fa-trash text-[10px]"></i></button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="bg-slate-800 p-3 sm:p-4 rounded-xl border border-slate-700 shadow-xl shrink-0">
              <button onClick={generate} disabled={loading} className={`w-full ${patternType==='O'?'text-white':'text-slate-900'} font-bold py-1.5 rounded-lg shadow-lg mb-2 active:scale-95 transition text-xs ${theme.bg} disabled:opacity-50`}><i className="fas fa-play"></i> 產生雙路線</button>
              <div className="flex justify-between items-center mb-1.5 gap-2">
                 <div className="flex bg-slate-900 rounded p-1 flex-1">
                   <button onClick={()=>setOutputTab('planting')} className={`flex-1 text-[10px] py-1 rounded font-bold transition ${outputTab==='planting'?`${theme.bg} ${patternType==='O'?'text-white':'text-slate-900'}`:'text-slate-400'}`}>種植</button>
                   <button onClick={()=>setOutputTab('fruit')} className={`flex-1 text-[10px] py-1 rounded font-bold transition ${outputTab==='fruit'?'bg-amber-500 text-slate-900':'text-slate-400'}`}>採果</button>
                 </div>
                 <div className="flex bg-slate-900 rounded border border-slate-600 overflow-hidden shrink-0 shadow-inner">
                    <button onClick={()=>setOutputFormat('gpx')} className={`px-2 py-1 text-[9px] transition ${outputFormat==='gpx'?'bg-slate-600 text-white':'text-slate-400'}`}>GPX</button>
                    <button onClick={()=>setOutputFormat('csv')} className={`px-2 py-1 text-[9px] transition ${outputFormat==='csv'?'bg-slate-600 text-white':'text-slate-400'}`}>座標</button>
                 </div>
              </div>
              <div className="relative h-16 bg-slate-900 rounded border border-slate-700 shadow-inner">
                <textarea className={`w-full h-full bg-transparent text-[9px] p-2 ${theme.text} custom-scrollbar outline-none`} readOnly value={currentOut} placeholder="等待生成..."></textarea>
                {currentOut && <div className="absolute bottom-1 right-1 flex gap-1"><button onClick={copyGPX} className="bg-slate-700 p-1 rounded active:scale-95 transition"><i className={`fas ${copied?`fa-check ${theme.text}`:'fa-copy text-white'} text-[10px]`}></i></button><button onClick={dlGPX} className={`${theme.bg} text-white px-2 rounded text-[10px] font-bold active:scale-95 transition`}><i className="fas fa-download"></i></button></div>}
              </div>
            </div>
          </div>

          <div className="lg:col-span-8 bg-slate-800/50 rounded-xl border border-slate-700 relative overflow-hidden shadow-2xl min-h-[50vh] lg:h-full flex flex-col pb-4">
            <div className="absolute top-2 left-2 z-10 flex gap-2 pointer-events-none w-full pr-4">
              <span className={`bg-slate-900/90 px-2 py-1.5 rounded text-[10px] border border-slate-700 text-white shadow-md pointer-events-auto backdrop-blur flex items-center gap-1`}><i className={`fas fa-${patternType==='O'?'sync text-purple-400':patternType==='S'?'leaf text-emerald-400':'bolt text-amber-400'}`}></i><span className="hidden sm:inline">{patternType==='O'?'圓舞':patternType==='S'?'種花':'稀有'}</span></span>
              <button onClick={resetZoom} className="bg-slate-700/90 hover:bg-slate-600 px-2 py-1.5 rounded text-[10px] text-white pointer-events-auto transition active:scale-95 ml-auto flex items-center gap-1"><i className="fas fa-crosshairs"></i> 置中</button>
            </div>
            
            <svg ref={svgRef} className="svg-container w-full h-full flex-1" viewBox="0 0 2000 2000">
              <pattern id="g1" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M 100 0 L 0 0 0 100" fill="none" stroke="#334155" strokeWidth="1"/></pattern>
              <rect width="100%" height="100%" fill="url(#g1)" />
              {vData && (
                <g transform={`translate(${transform.x}, ${transform.y}) scale(${transform.k})`}>
                  <g transform="translate(100, 100) scale(0.9)">
                    {vData.pPaths.map((p, i) => i < vData.pPaths.length-1 ? <line key={`l${i}`} x1={p[p.length-1].x} y1={p[p.length-1].y} x2={vData.pPaths[i+1][0].x} y2={vData.pPaths[i+1][0].y} stroke="#64748b" strokeWidth={2/transform.k} strokeDasharray="10,10"/> : null)}
                    
                    {vData.pPaths.map((p, i) => {
                      return (
                      <g key={`f${i}`}>
                        <circle cx={vData.toSVG(points[i].lat,points[i].lon).x} cy={vData.toSVG(points[i].lat,points[i].lon).y} r={vData.r40} fill={theme.hexMain} fillOpacity="0.05" stroke="#64748b" strokeWidth={1.5/transform.k} strokeDasharray="5,5"/>
                        <circle cx={vData.toSVG(points[i].lat,points[i].lon).x} cy={vData.toSVG(points[i].lat,points[i].lon).y} r={vData.r30} fill="none" stroke="#f59e0b" strokeWidth={1/transform.k} strokeDasharray="2,2" opacity="0.4"/>
                        <circle 
                            cx={vData.toSVG(points[i].lat,points[i].lon).x} 
                            cy={vData.toSVG(points[i].lat,points[i].lon).y} 
                            r={vData.r30*0.25} 
                            fill={theme.hexMain} 
                            className="transition-colors cursor-pointer hover:brightness-125 active:scale-90"
                            onClick={() => handleFlowerClick(i)}
                            style={{transformOrigin:`${vData.toSVG(points[i].lat,points[i].lon).x}px ${vData.toSVG(points[i].lat,points[i].lon).y}px`}} 
                        />
                        <text x={vData.toSVG(points[i].lat,points[i].lon).x} y={vData.toSVG(points[i].lat,points[i].lon).y} textAnchor="middle" dominantBaseline="central" fill="#0f172a" fontSize={24/transform.k} fontWeight="bold" className="pointer-events-none">{i+1}</text>
                        <polyline points={p.map(x=>`${x.x},${x.y}`).join(' ')} fill="none" stroke={theme.hexLine} strokeWidth={4/transform.k} strokeLinejoin="round" strokeLinecap="round" className="pointer-events-none"/>
                        <circle cx={p[0].x} cy={p[0].y} r={vData.r30*0.15} fill="#60a5fa" className="pointer-events-none"/>
                        <circle cx={p[p.length-1].x} cy={p[p.length-1].y} r={vData.r30*0.15} fill="#f87171" className="pointer-events-none"/>
                        <circle cx={vData.fPaths[i].x} cy={vData.fPaths[i].y} r={vData.r30*0.15} fill="#e879f9" className="pointer-events-none"/>
                      </g>)
                    })}
                    <polyline points={vData.fPaths.map(p=>`${p.x},${p.y}`).join(' ')} fill="none" stroke="#e879f9" strokeWidth={2.5/transform.k} strokeLinejoin="round" strokeLinecap="round" strokeDasharray="5,5" className="pointer-events-none"/>
                  </g>
                </g>
              )}
            </svg>
            {!vData && <div className="absolute inset-0 flex items-center justify-center text-slate-500 font-bold tracking-widest animate-pulse">待命狀態：請載入座標...</div>}
          </div>
        </div>
      );
    }

    // --- 【子元件：模式二 S2佈線掃蕩】 ---
    function Mode2() {
      // 導入 LocalStorage 狀態記憶
      const [config, setConfig] = useStickyState({ startCoord: '', width: '1.5', rows: '20', axis: 'EW', sweepDir: 'W', advDir: 'N', speedKmH: 18 }, 'pikmin_v32_m2_config');
      
      const [gpxOut, setGpxOut] = useState('');
      const [csvOut, setCsvOut] = useState('');
      const [outputFormat, setOutputFormat] = useState('gpx');
      const [vData, setVData] = useState(null);
      const [copied, setCopied] = useState(false);
      const [stats, setStats] = useState({ dist: 0, time: 0 });
      const [loading, setLoading] = useState(false);

      const svgRef = useRef(null);
      const [transform, setTransform] = useState({ k: 1, x: 0, y: 0 });
      const transformRef = useRef(transform); transformRef.current = transform;

      const generateGrid = useCallback(() => {
        setLoading(true);
        setTimeout(() => {
          try {
            const { startCoord, width: wStr, rows: rStr, axis, sweepDir, advDir, speedKmH } = config;
            const match = startCoord.match(/(-?\d+\.\d+)[,\s]+(-?\d+\.\d+)/);
            if (!match) { alert('請輸入有效的起點座標格式！'); setLoading(false); return; }
            const lat = parseFloat(match[1]); const lon = parseFloat(match[2]);
            if (!isValidCoord(lat, lon)) { alert('座標數值超出地球範圍（緯度 -90~90，經度 -180~180）'); setLoading(false); return; }

            const w = parseFloat(wStr); const r = parseInt(rStr, 10); const speed = parseFloat(speedKmH) || 18;
            if (isNaN(w) || isNaN(r)) { setLoading(false); return; }
            
            const mLon = getLonToMeters(lat); 
            const dLatStep = CONSTANTS.S2_SPACING_KM / (CONSTANTS.LAT_TO_M / 1000);
            const dLonStep = CONSTANTS.S2_SPACING_KM / (mLon / 1000);

            let pts = [];

            const getEW = (sLat, sLon, numR, lineW, sw, adv) => {
                let res = []; const dLonLine = lineW / (mLon / 1000);
                for (let i = 0; i < numR; i++) {
                    const isEven = i % 2 === 0;
                    const curLat = adv === 'N' ? sLat + (i * dLatStep) : sLat - (i * dLatStep);
                    let p1Lon = (sw === 'W') ? (isEven ? sLon : sLon - dLonLine) : (isEven ? sLon : sLon + dLonLine);
                    let p2Lon = (sw === 'W') ? (isEven ? sLon - dLonLine : sLon) : (isEven ? sLon + dLonLine : sLon);
                    res.push({ lat: curLat, lon: p1Lon, name: `EW_R${i+1}_1` }); 
                    res.push({ lat: curLat, lon: p2Lon, name: `EW_R${i+1}_2` });
                }
                return res;
            };

            const getNS = (sLat, sLon, numC, lineH, sw, adv) => {
                let res = []; const dLatLine = lineH / (CONSTANTS.LAT_TO_M / 1000);
                for (let i = 0; i < numC; i++) {
                    const isEven = i % 2 === 0;
                    const curLon = adv === 'E' ? sLon + (i * dLonStep) : sLon - (i * dLonStep);
                    let p1Lat = (sw === 'N') ? (isEven ? sLat : sLat + dLatLine) : (isEven ? sLat : sLat - dLatLine);
                    let p2Lat = (sw === 'N') ? (isEven ? sLat + dLatLine : sLat) : (isEven ? sLat - dLatLine : sLat);
                    res.push({ lat: p1Lat, lon: curLon, name: `NS_C${i+1}_1` }); 
                    res.push({ lat: p2Lat, lon: curLon, name: `NS_C${i+1}_2` });
                }
                return res;
            };

            if (axis === 'EW') pts = getEW(lat, lon, r, w, sweepDir, advDir);
            else if (axis === 'NS') pts = getNS(lat, lon, r, w, sweepDir, advDir);
            else {
                const totalH = (r - 1) * CONSTANTS.S2_SPACING_KM;
                const nsCols = Math.ceil(w / CONSTANTS.S2_SPACING_KM) + 1;
                const ew = getEW(lat, lon, r, w, sweepDir, advDir);
                const ns = getNS(lat, lon, nsCols, totalH, advDir, sweepDir); 
                pts = [...ew, ...ns];
            }

            const td = pts.reduce((acc, p, i) => i===0 ? 0 : acc + calcDistanceKm(pts[i-1], p), 0);
            setStats({ dist: td.toFixed(2), time: Math.round((td / speed) * 60) });

            let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="V32">\n  <trk><name>S2_Sweep</name><trkseg>\n`;
            let csv = '';
            pts.forEach(p => { xml += `    <trkpt lat="${p.lat.toFixed(6)}" lon="${p.lon.toFixed(6)}"><name>${p.name}</name></trkpt>\n`; csv += `${p.lat.toFixed(6)}, ${p.lon.toFixed(6)}\n`; });
            xml += `  </trkseg></trk></gpx>`; 
            setGpxOut(xml); setCsvOut(csv);
            
            let ml = Math.min(...pts.map(p=>p.lat)), xl = Math.max(...pts.map(p=>p.lat)), mn = Math.min(...pts.map(p=>p.lon)), xn = Math.max(...pts.map(p=>p.lon));
            
            if (xl === ml) { xl += 0.0005; ml -= 0.0005; }
            if (xn === mn) { xn += 0.0005; mn -= 0.0005; }
            const midLat = (ml + xl) / 2;
            const midLon = (mn + xn) / 2;
            const lonScale = Math.cos(midLat * Math.PI / 180);
            
            const dLat = xl - ml;
            const dLonEquiv = (xn - mn) * lonScale;
            const maxDeg = Math.max(dLat, dLonEquiv) * 1.15;
            
            const fMinLat = midLat - maxDeg / 2;
            const fMaxLat = midLat + maxDeg / 2;
            const fMinLon = midLon - (maxDeg / lonScale) / 2;
            const fMaxLon = midLon + (maxDeg / lonScale) / 2;

            const toSVG = (l, n) => ({ 
                x: ((n - fMinLon) / (fMaxLon - fMinLon)) * 2000, 
                y: 2000 - (((l - fMinLat) / (fMaxLat - fMinLat)) * 2000) 
            });
            setVData({ toSVG, path: pts.map(p=>toSVG(p.lat, p.lon)), pts }); resetZoom();
          } catch (err) {
            console.error(err);
            alert('生成發生錯誤，請檢查參數！');
          } finally {
            setLoading(false);
          }
        }, 10);
      }, [config]);

      useInteractiveMap(svgRef, transformRef, setTransform);
      const resetZoom = () => setTransform({ k: 1, x: 0, y: 0 });
      const currentOut = outputFormat==='gpx'?gpxOut:csvOut;
      
      const copyToClipboard = () => { 
        if(!currentOut) return;
        const ta = document.createElement('textarea'); ta.value = currentOut; ta.style.position = 'fixed'; 
        document.body.appendChild(ta); ta.select(); 
        try { document.execCommand('copy'); setCopied(true); setTimeout(()=>setCopied(false), 2000); } 
        catch(err) { console.error("複製失敗", err); } 
        finally { document.body.removeChild(ta); }
      };
      
      const dlGPX = () => { 
        if(!currentOut) return;
        const ext = outputFormat === 'gpx' ? 'gpx' : 'txt';
        const mime = outputFormat === 'gpx' ? 'text/xml' : 'text/plain';
        const axisName = config.axis === 'EW' ? 'EW' : config.axis === 'NS' ? 'SN' : 'Matrix';
        const ts = getTimestamp();
        const filename = `M2_${axisName}_${config.rows}列_${config.width}km_${ts}.${ext}`;
        
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(new Blob([currentOut], {type: mime})); 
        a.download = filename; 
        a.click(); 
      };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-5 flex-1 min-h-0 pb-4 relative">
          {loading && (
            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 rounded-xl">
              <i className="fas fa-spinner fa-spin text-3xl text-blue-400"></i>
              <span className="ml-3 text-blue-400 font-bold tracking-widest">運算中...</span>
            </div>
          )}
          <div className="lg:col-span-4 flex flex-col gap-4 lg:h-full min-h-0">
            <div className="bg-slate-800 p-3 sm:p-4 rounded-xl border border-slate-700 shadow-xl shrink-0">
              <h2 className="text-xs sm:text-sm font-bold text-blue-400 mb-3"><i className="fas fa-crosshairs mr-2"></i>佈線規劃</h2>
              <input type="text" className="w-full bg-slate-900 border border-slate-600 rounded p-1.5 text-xs text-white outline-none mb-3" value={config.startCoord} onChange={(e)=>setConfig({...config, startCoord: e.target.value})} placeholder="請輸入座標..." />
              <div className="flex bg-slate-900 rounded border border-slate-600 overflow-hidden mb-3 shadow-inner">
                <button onClick={()=>setConfig({...config, axis:'EW', sweepDir:'W', advDir:'N'})} className={`flex-1 py-1.5 text-[9px] font-bold transition ${config.axis==='EW'?'bg-blue-600 text-white':'text-slate-400 hover:bg-slate-700'}`}>東西單向</button>
                <button onClick={()=>setConfig({...config, axis:'NS', sweepDir:'N', advDir:'E'})} className={`flex-1 py-1.5 text-[9px] font-bold transition ${config.axis==='NS'?'bg-blue-600 text-white':'text-slate-400 hover:bg-slate-700'}`}>南北單向</button>
                <button onClick={()=>setConfig({...config, axis:'GRID'})} className={`flex-1 py-1.5 text-[9px] font-bold transition ${config.axis==='GRID'?'bg-blue-600 text-white':'text-slate-400 hover:bg-slate-700'}`}>矩陣棋盤</button>
              </div>
              <div className="grid grid-cols-3 gap-2 mb-3">
                <div><label className="text-[9px] text-slate-500 block mb-1">區域寬(km)</label><input type="number" step="0.1" className="w-full bg-slate-900 border border-slate-600 rounded p-1 text-xs text-white outline-none" value={config.width} onChange={(e)=>setConfig({...config, width: e.target.value})} /></div>
                <div><label className="text-[9px] text-slate-500 block mb-1">區域列數</label><input type="number" className="w-full bg-slate-900 border border-slate-600 rounded p-1 text-xs text-white outline-none" value={config.rows} onChange={(e)=>setConfig({...config, rows: e.target.value})} /></div>
                <div><label className="text-[9px] text-slate-500 block mb-1">時速(km/h)</label><input type="number" className="w-full bg-slate-900 border border-slate-600 rounded p-1 text-xs text-white outline-none" value={config.speedKmH} onChange={(e)=>setConfig({...config, speedKmH: e.target.value})} /></div>
              </div>
              
              <div className="grid grid-cols-2 gap-2 mb-4">
                <select className="w-full bg-slate-900 border border-slate-600 rounded p-1.5 text-[10px] sm:text-xs text-white outline-none shadow-inner" value={config.sweepDir} onChange={(e)=>setConfig({...config, sweepDir: e.target.value})}>
                    {config.axis === 'NS' ? (<><option value="N">向北掃(↑)</option><option value="S">向南掃(↓)</option></>) : (<><option value="W">向西掃(←)</option><option value="E">向東掃(→)</option></>)}
                </select>
                <select className="w-full bg-slate-900 border border-slate-600 rounded p-1.5 text-[10px] sm:text-xs text-white outline-none shadow-inner" value={config.advDir} onChange={(e)=>setConfig({...config, advDir: e.target.value})}>
                    {config.axis === 'NS' ? (<><option value="E">向東推進(→)</option><option value="W">向西推進(←)</option></>) : (<><option value="N">向北推進(↑)</option><option value="S">向南推進(↓)</option></>)}
                </select>
              </div>

              <button onClick={generateGrid} disabled={loading} className="w-full bg-blue-600 hover:brightness-110 text-white font-bold py-2 rounded-lg shadow-lg active:scale-95 transition text-xs disabled:opacity-50"><i className="fas fa-vector-square mr-2"></i>啟動規劃</button>
            </div>
            
            <div className="flex-1 bg-slate-800 p-3 sm:p-4 rounded-xl border border-slate-700 shadow-xl flex flex-col min-h-[200px]">
              <div className="flex justify-between items-center mb-2 shrink-0">
                <h2 className="text-xs sm:text-sm font-bold text-blue-400">輸出結果</h2>
                <div className="flex bg-slate-900 rounded border border-slate-700 overflow-hidden">
                    <button onClick={()=>setOutputFormat('gpx')} className={`px-2 py-1 text-[9px] ${outputFormat==='gpx'?'bg-blue-600 text-white':'text-slate-400'}`}>GPX</button>
                    <button onClick={()=>setOutputFormat('csv')} className={`px-2 py-1 text-[9px] ${outputFormat==='csv'?'bg-blue-600 text-white':'text-slate-400'}`}>座標</button>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-2 mb-2 shrink-0">
                <div className="bg-slate-900 p-1.5 rounded border border-slate-700 text-center"><span className="block text-[9px] text-slate-500">總里程</span><span className="text-blue-400 font-bold text-sm">{stats.dist} km</span></div>
                <div className="bg-slate-900 p-1.5 rounded border border-slate-700 text-center"><span className="block text-[9px] text-slate-500">總時間</span><span className="text-blue-400 font-bold text-sm">{stats.time} min</span></div>
              </div>
              <div className="relative flex-1 bg-slate-900 rounded border border-slate-700 min-h-[60px] shadow-inner">
                <textarea className="w-full h-full bg-transparent text-[9px] p-2 text-blue-200 outline-none custom-scrollbar" readOnly value={outputFormat==='gpx'?gpxOut:csvOut} placeholder="等待生成..."></textarea>
                {currentOut && <div className="absolute bottom-1 right-1 flex gap-1"><button onClick={copyToClipboard} className="bg-slate-700 p-1 rounded active:scale-95 transition"><i className={`fas ${copied?'fa-check text-blue-400':'fa-copy text-white'} text-[10px]`}></i></button><button onClick={dlGPX} className="bg-blue-600 text-white px-2 rounded text-[10px] font-bold active:scale-95 transition"><i className="fas fa-download"></i></button></div>}
              </div>
            </div>
          </div>
          
          <div className="lg:col-span-8 bg-slate-800/50 rounded-xl border border-slate-700 relative overflow-hidden shadow-2xl min-h-[50vh] lg:h-full flex flex-col pb-4">
             <div className="absolute top-2 left-2 z-10 flex gap-2 w-full pr-4 pointer-events-none"><span className="bg-slate-900/90 px-2 py-1.5 rounded text-[10px] border border-slate-700 text-blue-400 shadow-md backdrop-blur pointer-events-auto"><i className="fas fa-th mr-1"></i> {config.axis==='GRID'?'矩陣棋盤網格':'佈線掃蕩'}</span><button onClick={resetZoom} className="bg-slate-700/90 hover:bg-slate-600 px-2 py-1.5 rounded text-[10px] text-white backdrop-blur shadow-md pointer-events-auto ml-auto transition active:scale-95"><i className="fas fa-crosshairs mr-1"></i>置中</button></div>
            <svg ref={svgRef} className="svg-container w-full h-full flex-1" viewBox="0 0 2000 2000"><pattern id="g2" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M 100 0 L 0 0 0 100" fill="none" stroke="#1e293b" strokeWidth="2"/></pattern><rect width="100%" height="100%" fill="url(#g2)" />
              {vData && (<g transform={`translate(${transform.x}, ${transform.y}) scale(${transform.k})`}><g transform="translate(100, 100) scale(0.9)"><polyline points={vData.path.map(p=>`${p.x},${p.y}`).join(' ')} fill="none" stroke="#3b82f6" strokeWidth={5/transform.k} strokeLinejoin="miter"/><circle cx={vData.path[0].x} cy={vData.path[0].y} r={20/transform.k} fill="#22c55e"/><text x={vData.path[0].x} y={vData.path[0].y-35/transform.k} fill="#22c55e" fontSize={24/transform.k} textAnchor="middle" fontWeight="bold">起點</text><circle cx={vData.path[vData.path.length-1].x} cy={vData.path[vData.path.length-1].y} r={20/transform.k} fill="#ef4444"/><text x={vData.path[vData.path.length-1].x} y={vData.path[vData.path.length-1].y-35/transform.k} fill="#ef4444" fontSize={24/transform.k} textAnchor="middle" fontWeight="bold">終點</text></g></g>)}
            </svg>
            {!vData && <div className="absolute inset-0 flex items-center justify-center text-slate-500 font-bold tracking-widest"><i className="fas fa-satellite mr-2 animate-bounce"></i>待命狀態：請啟動規劃...</div>}
          </div>
        </div>
      );
    }

    function App() {
      // 導入 LocalStorage 狀態記憶
      const [appMode, setAppMode] = useStickyState('mode1', 'pikmin_v32_appmode');
      return (
        <div className="lg:h-screen min-h-screen flex flex-col p-2 sm:p-4">
          <div className="max-w-[1600px] w-full mx-auto flex-1 flex flex-col min-h-0">
            <div className="flex flex-col sm:flex-row justify-between items-center mb-3 bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-lg shrink-0">
              <div className="flex items-center gap-3 px-2"><i className="fab fa-neos text-2xl text-emerald-400"></i><div><h1 className="text-base font-black tracking-wider text-white uppercase">PIKMIN NAVIGATOR</h1><p className="text-[9px] text-slate-400 tracking-widest flex items-center gap-1">TACTICAL ROUTE PLANNER V32 <span className="bg-rose-500 text-white px-1 rounded-sm shadow-sm text-[8px] font-bold">改了好多版</span></p></div></div>
              <div className="flex bg-slate-900 rounded-lg p-1 border border-slate-700 w-full sm:w-auto mt-2 sm:mt-0">
                <button onClick={()=>setAppMode('mode1')} className={`flex-1 sm:px-6 py-1.5 rounded-md text-xs font-bold transition ${appMode==='mode1'?'bg-emerald-500 text-slate-900':'text-slate-400 hover:text-emerald-400'}`}><i className="fas fa-crosshairs mr-1"></i> 精準控花</button>
                <button onClick={()=>setAppMode('mode2')} className={`flex-1 sm:px-6 py-1.5 rounded-md text-xs font-bold transition ${appMode==='mode2'?'bg-blue-500 text-slate-900':'text-slate-400 hover:text-blue-400'}`}><i className="fas fa-satellite mr-1"></i> S2掃蕩</button>
              </div>
            </div>
            <div className="flex-1 min-h-0 flex flex-col">{appMode==='mode1'?<Mode1/>:<Mode2/>}</div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
